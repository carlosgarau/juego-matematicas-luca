<!doctype html>
<html lang="ca"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover"><meta name="theme-color" content="#7555c7"><title>Memory d'aventures</title><style>:root{--ink:#20304a;--purple:#7555c7;--gold:#ffd166}*{box-sizing:border-box}body{margin:0;min-height:100vh;font-family:system-ui,sans-serif;color:var(--ink);background:linear-gradient(145deg,#8dd9df,#a88ce2);display:grid;place-items:center}.game{width:min(900px,96vw);min-height:91vh;background:#fffaf0;border:7px solid white;border-radius:30px;padding:clamp(14px,4vw,34px);text-align:center;box-shadow:0 18px 55px #20304a66}h1{font-size:clamp(2rem,6vw,3.8rem);margin:.2em}.hidden{display:none!important}button{border:0;border-radius:18px;background:var(--gold);color:var(--ink);font:inherit;font-weight:850;padding:12px 18px;box-shadow:0 6px 0 #b48e30;cursor:pointer}.profiles{display:flex;justify-content:center;flex-wrap:wrap;gap:12px;margin:22px}.profile span{display:block;font-size:3rem}.profile small{display:block}.top{display:flex;justify-content:space-between;align-items:center;gap:8px;flex-wrap:wrap}.badge{background:var(--ink);color:white;border-radius:15px;padding:9px 13px;font-weight:800}.board{display:grid;grid-template-columns:repeat(var(--cols),minmax(58px,1fr));gap:clamp(7px,2vw,13px);max-width:720px;margin:25px auto}.card{aspect-ratio:1;border:0;border-radius:18px;background:var(--purple);color:white;font-size:clamp(2rem,8vw,4.5rem);box-shadow:0 6px 0 #4b3788;padding:0;transform-style:preserve-3d;transition:transform .25s}.card.open,.card.matched{background:white;color:var(--ink);transform:rotateY(180deg);box-shadow:0 4px 0 #bcb4d3}.message{font-size:clamp(1.1rem,3vw,1.5rem);font-weight:800;min-height:1.5em}.party{animation:party .55s 2}@keyframes party{50%{transform:scale(1.03)}}.confetti{position:fixed;top:-8vh;font-size:1.8rem;animation:fall 1.7s linear forwards}@keyframes fall{to{transform:translateY(115vh) rotate(600deg)}}@media(max-width:480px){.game{width:100vw;border:0;border-radius:0;padding:9px}.board{gap:7px}.card{border-radius:12px}}</style></head><body><main class="game" id="game">
<section id="profiles"><div style="font-size:5rem">🧠</div><h1>El joc de memòria</h1><p>Troba totes les parelles i guanya estrelles.</p><div class="profiles" id="profileList"></div><button onclick="location.href='matematicas.html?nou=1&amp;idioma=ca'">➕ JUGADOR NOU</button></section>
<section id="play" class="hidden"><div class="top"><button id="back">👥 CANVIAR</button><span class="badge" id="level"></span><span class="badge" id="stars"></span><span class="badge" id="pairs"></span></div><h1 id="title"></h1><p class="message" id="message"></p><div class="board" id="board"></div><button class="hidden" id="next">SEGÜENT NIVELL ➜</button></section>
</main><script src="voice-quality.js"></script><script>
const $=x=>document.getElementById(x),icons=['🐉','🚀','⚽','🦄','🐸','🍎','🌙','⭐','🏰','🚂'],sizes=[4,6,8,10];let profiles=JSON.parse(localStorage.getItem('perfilsNombres')||'null'),active=null,current=0,open=[],lock=false,matched=0;if(!profiles){let old=Math.max(0,Number(localStorage.getItem('estrellasLucaMatematicas'))||15);profiles=[{id:'luca',name:'Luca',avatar:'🐉',lang:'ca',level:6,stars:old,memoryLevel:1},{id:'cloe',name:'Cloe',avatar:'🦄',lang:'ca',level:1,stars:0,memoryLevel:1}];save()}profiles.forEach(p=>p.memoryLevel=p.memoryLevel||1);save();
function save(){localStorage.setItem('perfilsNombres',JSON.stringify(profiles))}function speak(t,next){sayGameText(t,'ca-ES',next,.78)}function shuffle(a){for(let i=a.length-1;i;i--){let j=Math.floor(Math.random()*(i+1));[a[i],a[j]]=[a[j],a[i]]}return a}
function renderProfiles(){$('profileList').innerHTML='';profiles.forEach(p=>{let b=document.createElement('button');b.className='profile';b.innerHTML=`<span>${p.avatar}</span>${p.name}<small>Nivell ${p.memoryLevel} · ⭐ ${p.stars}</small>`;b.onclick=()=>select(p.id);$('profileList').appendChild(b)})}function select(id){active=profiles.find(p=>p.id===id);current=Math.min(4,active.memoryLevel)-1;$('profiles').classList.add('hidden');$('play').classList.remove('hidden');load()}
function load(){open=[];lock=false;matched=0;let count=sizes[current],chosen=icons.slice(0,count),deck=shuffle([...chosen,...chosen].map((icon,i)=>({icon,id:i,pair:icon})));$('level').textContent=`NIVELL ${current+1}`;$('stars').textContent=`⭐ ${active.stars}`;$('pairs').textContent=`0 / ${count}`;$('title').textContent=`${count} parelles`;$('message').textContent='Gira dues cartes i troba les parelles.';$('next').classList.add('hidden');let cols=count<=4?4:count<=6?4:5;$('board').style.setProperty('--cols',cols);$('board').innerHTML='';deck.forEach(d=>{let b=document.createElement('button');b.className='card';b.textContent='?';b.dataset.pair=d.pair;b.setAttribute('aria-label','Carta amagada');b.onclick=()=>flip(b);$('board').appendChild(b)});let n={4:'quatre',6:'sis',8:'vuit',10:'deu'}[count];speak(`Troba les ${n} parelles. Gira dues cartes cada vegada.`)}
function flip(card){if(lock||card.classList.contains('open')||card.classList.contains('matched'))return;card.classList.add('open');card.textContent=card.dataset.pair;open.push(card);if(open.length<2)return;lock=true;let[a,b]=open;if(a.dataset.pair===b.dataset.pair){setTimeout(()=>{a.classList.add('matched');b.classList.add('matched');active.stars++;matched++;save();$('stars').textContent=`⭐ ${active.stars}`;$('pairs').textContent=`${matched} / ${sizes[current]}`;$('message').textContent='BRAVO! Has trobat una parella.';open=[];lock=false;speak('BRAVO! Has trobat una parella.');if(matched===sizes[current])complete()},450)}else setTimeout(()=>{a.classList.remove('open');b.classList.remove('open');a.textContent='?';b.textContent='?';open=[];lock=false;$('message').textContent='No són iguals. Recorda on eren.';speak('No són iguals. Recorda on eren i torna-ho a provar.')},850)}
function complete(){party();if(current<3){active.memoryLevel=Math.max(active.memoryLevel,current+2);save();$('next').classList.remove('hidden');$('message').textContent='Molt bé! Has desbloquejat un nivell més difícil!';speak('Molt bé! Has completat el joc de memòria i has desbloquejat un nivell més difícil.')}else speak('Increïble! Has completat el nivell més difícil!')}function party(){let g=$('game');g.classList.add('party');setTimeout(()=>g.classList.remove('party'),1000);for(let i=0;i<12;i++){let x=document.createElement('div');x.className='confetti';x.textContent=['⭐','🎉','🧠'][i%3];x.style.left=Math.random()*100+'vw';document.body.appendChild(x);setTimeout(()=>x.remove(),1900)}}
$('back').onclick=()=>{$('play').classList.add('hidden');$('profiles').classList.remove('hidden');renderProfiles();speak('Tria un jugador.')};$('next').onclick=()=>{current++;load()};renderProfiles();speak('Tria qui jugarà al joc de memòria.');
</script>
</body><div id="codex-browser-sidebar-comments-root" style="position: fixed; inset: 0px; pointer-events: none; z-index: 2147483647;"></div></html>
