<!doctype html>
<html lang="ca">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
<meta name="theme-color" content="#6846c7">
<title>MEMORY DE LUCA</title>
<style>
:root{--ink:#20304a;--purple:#6846c7;--gold:#ffd166;--red:#e94f64}*{box-sizing:border-box}body{margin:0;min-height:100vh;font-family:system-ui,sans-serif;color:var(--ink);background:linear-gradient(145deg,#5fd3df,#a98be8);display:grid;place-items:center}.game{width:min(1080px,98vw);min-height:94vh;background:#fffaf0;border:7px solid white;border-radius:30px;padding:clamp(10px,2.5vw,26px);text-align:center;box-shadow:0 18px 55px #20304a66;overflow:hidden}.hidden{display:none!important}h1{font-size:clamp(1.8rem,5vw,3.5rem);margin:.15em}button{border:0;border-radius:18px;background:var(--gold);color:var(--ink);font:inherit;font-weight:900;padding:11px 17px;box-shadow:0 6px 0 #b48e30;cursor:pointer}.profiles{display:flex;justify-content:center;flex-wrap:wrap;gap:12px;margin:22px}.profile span{display:block;font-size:3rem}.profile small{display:block}.top{display:flex;justify-content:space-between;align-items:center;gap:7px;flex-wrap:wrap}.badge{background:var(--ink);color:white;border-radius:15px;padding:8px 12px;font-weight:900}.lives{font-size:1.45rem;letter-spacing:.08em}.board{display:grid;grid-template-columns:repeat(var(--cols),minmax(54px,1fr));gap:clamp(5px,1.3vw,11px);max-width:940px;margin:16px auto}.card{position:relative;aspect-ratio:1;border:0;border-radius:16px;background:linear-gradient(145deg,#7a58d2,#5436a7);color:white;font-size:clamp(1.8rem,6vw,4.3rem);box-shadow:0 5px 0 #3f287d;padding:0;overflow:hidden;transition:transform .2s,background .2s}.card::after{content:'★';display:grid;place-items:center;position:absolute;inset:0;font-size:clamp(1.8rem,6vw,4.2rem);color:#ffd166}.card.open,.card.matched{background:white;transform:rotateY(180deg);box-shadow:0 3px 0 #bbb2d2}.card.open::after,.card.matched::after{display:none}.face{position:absolute;inset:4%;display:grid;place-items:center;transform:rotateY(180deg);border-radius:12px;background:#fff;font-size:inherit}.sprite{background-repeat:no-repeat;background-size:400% 400%;border:2px solid #fff}.message{font-size:clamp(1rem,2.7vw,1.35rem);font-weight:900;min-height:1.5em;margin:.4em}.restart{animation:shake .25s 3}.party{animation:party .45s 2}@keyframes party{50%{transform:scale(1.02)}}@keyframes shake{25%{transform:translateX(-8px)}75%{transform:translateX(8px)}}.confetti{position:fixed;top:-8vh;font-size:1.8rem;animation:fall 1.7s linear forwards}@keyframes fall{to{transform:translateY(115vh) rotate(600deg)}}@media(max-width:620px){.game{width:100vw;border:0;border-radius:0;padding:7px}.board{gap:5px}.card{border-radius:10px}.top{justify-content:center}.badge{font-size:.82rem;padding:6px 8px}}
</style>
</head>
<body>
<main class="game" id="game">
<section id="profilesScreen">
<div style="font-size:5rem">🧠</div>
<h1>MEMORY DE LUCA</h1>
<p>TROBA LES PARELLES I SUPERA TOTS ELS NIVELLS.</p>
<div class="profiles" id="profileList"></div>
<button onclick="location.href='index.html'">🎡 TORNAR ALS JOCS</button>
</section>
<section id="play" class="hidden">
<div class="top">
<button id="back">👥 CANVIAR</button>
<span class="badge" id="level"></span>
<span class="badge" id="theme"></span>
<span class="badge lives" id="lives"></span>
<span class="badge" id="stars"></span>
</div>
<h1 id="title"></h1>
<p class="message" id="message"></p>
<div class="board" id="board"></div>
<button class="hidden" id="next">SEGÜENT NIVELL ➜</button>
</section>
</main>
<script src="voice-quality.js"></script>
<script>
const $=id=>document.getElementById(id);
const emojiThemes=[
{name:'ANIMALS',icon:'🐾',items:['🐶','🐱','🐭','🐹','🐰','🦊','🐻','🐼','🐨','🐯','🦁','🐮','🐷','🐸','🐵','🐧','🐦','🦆','🦉','🦋','🐝','🐞','🦄','🐢']},
{name:'ESPAI',icon:'🚀',items:['🚀','🛸','🌍','🌙','☀️','⭐','🪐','☄️','👨‍🚀','👽','🔭','🛰️','🌌','🌠','🌓','🌕','🌞','🌛','💫','🛰']},
{name:'MENJAR',icon:'🍓',items:['🍎','🍐','🍊','🍋','🍌','🍉','🍇','🍓','🫐','🍒','🍑','🥝','🍅','🥕','🌽','🍕','🍔','🌮','🍪','🧁','🍩','🍦','🥨','🥞']},
{name:'MAR',icon:'🐠',items:['🐠','🐟','🐡','🦈','🐙','🦑','🦀','🦞','🐬','🐳','🐋','🦭','🐚','🪸','⚓','⛵','🏝️','🌊','🛟','🚤']},
{name:'ESPORTS',icon:'⚽',items:['⚽','🏀','🏈','⚾','🎾','🏐','🏉','🥏','🎱','🏓','🏸','🥅','⛳','🏹','🥊','🛹','🛼','🚲','🏆','🥇']},
{name:'AVENTURES',icon:'🏰',items:['🏰','🗺️','🧭','⚔️','🛡️','👑','💎','🔑','🪄','🧙','🧚','🧜','🐉','🦖','🦕','🌋','⛺','🎪','🎠','🎈','🎁','🪁']}
];
const pictureThemes=[
{name:'COTXES',icon:'🏎️',image:'assets/memory-cotxes.png',count:16},
{name:'FANTASIA',icon:'✨',image:'assets/memory-fantasia.png',count:16}
];
let profiles=JSON.parse(localStorage.getItem('perfilsNombres')||'null'),active=null,levelIndex=0,openCards=[],locked=false,matched=0,mistakes=0,roundId=0,lastSignature='';
if(!profiles){profiles=[{id:'luca',name:'LUCA',avatar:'🐉',lang:'ca',level:1,stars:15,memoryLevel:1},{id:'cloe',name:'CLOE',avatar:'🦄',lang:'ca',level:1,stars:0,memoryLevel:1}];save()}
profiles.forEach(p=>{p.memoryLevel=Math.max(1,p.memoryLevel||1);p.stars=Math.max(0,p.stars||0)});save();
function save(){localStorage.setItem('perfilsNombres',JSON.stringify(profiles))}
function shuffle(array){for(let i=array.length-1;i>0;i--){let j=Math.floor(Math.random()*(i+1));[array[i],array[j]]=[array[j],array[i]]}return array}
function pairCount(level){return Math.min(16,4+Math.floor((level-1)/3))}
function themeFor(level){let all=[emojiThemes[0],pictureThemes[0],emojiThemes[1],pictureThemes[1],emojiThemes[2],emojiThemes[3],emojiThemes[4],emojiThemes[5]];return all[(level-1)%all.length]}
function renderProfiles(){$('profileList').innerHTML='';profiles.forEach(p=>{let b=document.createElement('button');b.className='profile';b.innerHTML=`<span>${p.avatar}</span>${p.name}<small>NIVELL ${p.memoryLevel} · ⭐ ${p.stars}</small>`;b.onclick=()=>select(p.id);$('profileList').appendChild(b)})}
function select(id){active=profiles.find(p=>p.id===id);if(!active)return;localStorage.setItem('perfilActiu',id);levelIndex=active.memoryLevel-1;$('profilesScreen').classList.add('hidden');$('play').classList.remove('hidden');startLevel(false)}
function chooseValues(theme,count){let pool=theme.items?theme.items.map((value,index)=>({value,index})):Array.from({length:theme.count},(_,index)=>({value:String(index),index}));let chosen,signature,guard=0;do{chosen=shuffle([...pool]).slice(0,count);signature=chosen.map(x=>x.index).sort((a,b)=>a-b).join('-');guard++}while(signature===lastSignature&&guard<8);lastSignature=signature;return chosen}
function makeFace(theme,item){let face=document.createElement('span');face.className='face';if(theme.image){face.classList.add('sprite');face.style.backgroundImage=`url('${theme.image}')`;let x=(item.index%4)*100/3,y=Math.floor(item.index/4)*100/3;face.style.backgroundPosition=`${x}% ${y}%`}else face.textContent=item.value;return face}
function startLevel(restarted){roundId++;openCards=[];locked=false;matched=0;mistakes=0;let level=levelIndex+1,count=pairCount(level),theme=themeFor(level),chosen=chooseValues(theme,count),deck=shuffle([...chosen,...chosen].map((item,i)=>({...item,cardId:i})));$('level').textContent=`NIVELL ${level}`;$('theme').textContent=`${theme.icon} ${theme.name}`;$('lives').textContent='❤️❤️❤️';$('stars').textContent=`⭐ ${active.stars}`;$('title').textContent=`${count} PARELLES`;$('message').textContent=restarted?'TAULER NOU. TENS 3 INTENTS.':'GIRA DUES CARTES I TROBA LES PARELLES.';$('next').classList.add('hidden');let cols=count<=4?4:count<=6?4:count<=10?5:count<=12?6:8;$('board').style.setProperty('--cols',cols);$('board').innerHTML='';deck.forEach(item=>{let card=document.createElement('button');card.className='card';card.dataset.pair=item.value;card.setAttribute('aria-label','CARTA AMAGADA');card.appendChild(makeFace(theme,item));card.onclick=()=>flip(card);$('board').appendChild(card)});if(!restarted)speakInstruction(count)}
function speakInstruction(count){let words=['ZERO','UNA','DUES','TRES','QUATRE','CINC','SIS','SET','VUIT','NOU','DEU','ONZE','DOTZE','TRETZE','CATORZE','QUINZE','SETZE'];sayGameText(`TROBA LES ${words[count]} PARELLES. NOMÉS POTS FALLAR TRES VEGADES.`,'ca-ES',null,.78)}
function flip(card){if(locked||card.classList.contains('open')||card.classList.contains('matched'))return;card.classList.add('open');openCards.push(card);if(openCards.length<2)return;locked=true;let[a,b]=openCards;if(a.dataset.pair===b.dataset.pair){setTimeout(()=>match(a,b),320)}else setTimeout(()=>miss(a,b),650)}
function match(a,b){a.classList.add('matched');b.classList.add('matched');active.stars++;matched++;save();$('stars').textContent=`⭐ ${active.stars}`;$('message').textContent='BRAVO!';openCards=[];locked=false;sayGameText('BRAVO!','ca-ES',null,.82);if(matched===pairCount(levelIndex+1))complete()}
function miss(a,b){a.classList.remove('open');b.classList.remove('open');openCards=[];mistakes++;$('lives').textContent='❤️'.repeat(Math.max(0,3-mistakes))+'🖤'.repeat(Math.min(3,mistakes));locked=false;if(mistakes<3){$('message').textContent=`ET QUEDEN ${3-mistakes} INTENTS.`;return}$('message').textContent='HAS GASTAT ELS 3 INTENTS. TORNEM A COMENÇAR!';$('game').classList.add('restart');locked=true;let token=roundId;setTimeout(()=>{if(token!==roundId)return;$('game').classList.remove('restart');startLevel(true)},1350)}
function complete(){locked=true;party();active.memoryLevel=Math.max(active.memoryLevel,levelIndex+2);save();$('message').textContent='BRAVO! NIVELL SUPERAT!';$('next').classList.remove('hidden')}
function party(){let g=$('game');g.classList.add('party');setTimeout(()=>g.classList.remove('party'),900);for(let i=0;i<12;i++){let x=document.createElement('div');x.className='confetti';x.textContent=['⭐','🎉','🧠'][i%3];x.style.left=Math.random()*100+'vw';document.body.appendChild(x);setTimeout(()=>x.remove(),1800)}}
$('back').onclick=()=>{speechSynthesis.cancel();$('play').classList.add('hidden');$('profilesScreen').classList.remove('hidden');renderProfiles()};$('next').onclick=()=>{levelIndex++;startLevel(false)};renderProfiles();let perfilActiu=new URLSearchParams(location.search).get('jugador')||localStorage.getItem('perfilActiu');if(perfilActiu&&profiles.some(p=>p.id===perfilActiu))select(perfilActiu);
</script>
</body>
</html>
