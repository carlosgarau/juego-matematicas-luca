<!doctype html>
<html lang="ca"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover"><meta name="theme-color" content="#4a90a4"><title>Troba les diferències</title>
<style>:root{--ink:#17324d;--gold:#ffd166;--red:#e74747;--sea:#5bc6d4}*{box-sizing:border-box}body{margin:0;min-height:100vh;font-family:system-ui,sans-serif;color:var(--ink);background:linear-gradient(#62cbd8,#f3d078);display:grid;place-items:center}.game{width:min(1060px,97vw);min-height:92vh;background:#fffdf4;border:7px solid white;border-radius:30px;padding:clamp(12px,3vw,28px);box-shadow:0 18px 55px #17324d77;text-align:center;overflow:hidden}h1{font-size:clamp(1.8rem,5vw,3.5rem);margin:.15em}.hidden{display:none!important}.top{display:flex;justify-content:space-between;align-items:center;gap:8px;flex-wrap:wrap}.badge{background:var(--ink);color:white;border-radius:16px;padding:9px 13px;font-weight:800}.profiles{display:flex;justify-content:center;gap:12px;flex-wrap:wrap;margin:22px}.profile,button{border:0;border-radius:18px;background:var(--gold);color:var(--ink);font:inherit;font-weight:850;padding:12px 18px;box-shadow:0 6px 0 #b79432;cursor:pointer}.profile span{display:block;font-size:3rem}.profile small{display:block}.scenes{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-top:12px}.scene{position:relative;min-width:0;border:4px solid #fff;border-radius:18px;overflow:hidden;background:#dff5f7;box-shadow:0 4px 12px #17324d33}.scene svg{display:block;width:100%;height:auto}.hit{position:absolute;margin:0;padding:0;background:transparent;border:0;box-shadow:none;opacity:0}.hit.found{opacity:1;border:4px solid var(--red);border-radius:50%;background:#e7474722}.message{font-size:clamp(1rem,2.8vw,1.4rem);font-weight:800;min-height:1.5em}.next{background:#9be09f}.party{animation:party .55s 2}@keyframes party{50%{transform:scale(1.025)}}.confetti{position:fixed;top:-8vh;font-size:1.8rem;z-index:10;animation:fall 1.7s linear forwards}@keyframes fall{to{transform:translateY(115vh) rotate(600deg)}}@media(max-width:520px){.game{width:100vw;border-radius:0;border-width:0;padding:8px}.scenes{gap:4px}.scene{border-width:2px;border-radius:10px}.badge{padding:7px 9px;font-size:.9rem}.hit.found{border-width:3px}}</style></head>
<body><main class="game" id="game">
<section id="profiles"><div style="font-size:5rem">🔎</div><h1>Qui busca les diferències?</h1><p>Les estrelles també compten als altres jocs.</p><div class="profiles" id="profileList"></div><button onclick="location.href='matematicas.html?nou=1&amp;idioma=ca'">➕ JUGADOR NOU</button></section>
<section id="play" class="hidden"><div class="top"><button id="back">👥 CANVIAR</button><span class="badge" id="level"></span><span class="badge" id="stars"></span><span class="badge" id="counter"></span></div><h1 id="title"></h1><p class="message" id="message">Toca una diferència a qualsevol dibuix.</p><div class="scenes"><div class="scene" id="left"></div><div class="scene" id="right"></div></div><button class="next hidden" id="next">SEGÜENT NIVELL ➜</button></section>
</main><script>
const $=x=>document.getElementById(x),baseStart='<svg viewBox="0 0 360 260" aria-hidden="true">',end='</svg>';
const levels=[
{name:"L'illa pirata",left:`${baseStart}<rect width="360" height="260" fill="#aee8f2"/><rect y="155" width="360" height="105" fill="#57bdd2"/><circle cx="55" cy="48" r="24" fill="#ffd65a"/><g stroke="#ffd65a" stroke-width="4"><path d="M55 10v13M55 73v13M17 48h13M80 48h13M28 21l9 9M73 66l9 9M82 21l-9 9M37 66l-9 9"/></g><path d="M0 224Q80 175 165 220Q255 170 360 221V260H0Z" fill="#edcb69"/><path d="M285 205Q276 145 300 86" fill="none" stroke="#79543d" stroke-width="10"/><path d="M300 91q-30-27-53 3q29-7 48 8M301 91q18-33 46-14q-28 4-42 18M300 91q3-35 29-38q-20 15-23 40" fill="#47a65b"/><circle cx="292" cy="101" r="8" fill="#68412f"/><circle cx="310" cy="104" r="8" fill="#68412f"/><path d="M145 200Q206 219 269 200L253 229H164Z" fill="#b85b3d"/><path d="M205 198V82" stroke="#49372e" stroke-width="5"/><path d="M205 91V177H254Z" fill="white" stroke="#49372e" stroke-width="2"/><path d="M205 84L245 96L205 105Z" fill="#e84747"/><path d="M94 81q12-15 24 0q12-15 24 0" fill="none" stroke="#394c5a" stroke-width="4"/><g transform="translate(83 222)" stroke="#e84747" stroke-width="4"><circle r="10" fill="#e84747"/><path d="M-9-3l-13-9M9-3l13-9M-9 3l-14 7M9 3l14 7"/></g>${end}`,right:`${baseStart}<rect width="360" height="260" fill="#aee8f2"/><rect y="155" width="360" height="105" fill="#57bdd2"/><circle cx="55" cy="48" r="24" fill="#ffd65a"/><path d="M0 224Q80 175 165 220Q255 170 360 221V260H0Z" fill="#edcb69"/><path d="M285 205Q276 145 300 86" fill="none" stroke="#79543d" stroke-width="10"/><path d="M300 91q-30-27-53 3q29-7 48 8M301 91q18-33 46-14q-28 4-42 18M300 91q3-35 29-38q-20 15-23 40" fill="#47a65b"/><circle cx="286" cy="101" r="8" fill="#68412f"/><circle cx="302" cy="105" r="8" fill="#68412f"/><circle cx="317" cy="99" r="8" fill="#68412f"/><path d="M145 200Q206 219 269 200L253 229H164Z" fill="#b85b3d"/><path d="M205 198V82" stroke="#49372e" stroke-width="5"/><path d="M205 91V177H254Z" fill="white" stroke="#49372e" stroke-width="2"/><path d="M94 81q12-15 24 0q12-15 24 0M133 65q10-12 20 0q10-12 20 0" fill="none" stroke="#394c5a" stroke-width="4"/><path d="M83 208l4 10h11l-9 7 4 11-10-6-10 6 4-11-9-7h11Z" fill="#f08bc3"/>${end}`,spots:[['sun',5,4,22,30],['flag',52,24,22,22],['bird',21,20,29,26],['coconuts',73,27,20,25],['crab',14,72,23,25]]},
{name:'El bosc encantat',left:`${baseStart}<rect width="360" height="260" fill="#bce6ef"/><rect y="170" width="360" height="90" fill="#72bd66"/><path d="M0 220Q95 175 190 225Q285 185 360 215V260H0Z" fill="#4c9b58"/><g fill="white"><circle cx="50" cy="45" r="18"/><circle cx="70" cy="45" r="24"/><circle cx="91" cy="47" r="17"/></g><rect x="55" y="95" width="22" height="105" fill="#76513d"/><circle cx="66" cy="78" r="52" fill="#3d9656"/><circle cx="45" cy="75" r="8" fill="#e64b4b"/><circle cx="76" cy="55" r="8" fill="#e64b4b"/><circle cx="91" cy="88" r="8" fill="#e64b4b"/><path d="M165 203L220 118L275 203Z" fill="#f39c4a"/><path d="M220 118V83" stroke="#58453d" stroke-width="5"/><path d="M220 84l35 12-35 12Z" fill="#9b5de5"/><path d="M160 230Q220 190 360 225" fill="none" stroke="#68cbe0" stroke-width="28"/><g transform="translate(300 204)" fill="#63b85e"><ellipse rx="18" ry="11"/><circle cy="-10" r="10"/><circle cx="-5" cy="-13" r="2"/><circle cx="5" cy="-13" r="2"/></g><g transform="translate(125 73)" fill="#f7ca54"><ellipse rx="10" ry="6"/><circle cx="-7" cy="-8" r="5"/><circle cx="7" cy="-8" r="5"/><circle cx="-3" cy="-2" r="2" fill="#69495d"/><circle cx="4" cy="-1" r="2" fill="#69495d"/></g>${end}`,right:`${baseStart}<rect width="360" height="260" fill="#bce6ef"/><rect y="170" width="360" height="90" fill="#72bd66"/><path d="M0 220Q95 175 190 225Q285 185 360 215V260H0Z" fill="#4c9b58"/><g fill="white"><circle cx="50" cy="45" r="18"/><circle cx="70" cy="45" r="24"/><circle cx="91" cy="47" r="17"/><circle cx="105" cy="50" r="12"/></g><rect x="55" y="95" width="22" height="105" fill="#76513d"/><circle cx="66" cy="78" r="52" fill="#3d9656"/><circle cx="45" cy="75" r="8" fill="#e64b4b"/><circle cx="91" cy="88" r="8" fill="#e64b4b"/><path d="M165 203L220 118L275 203Z" fill="#f39c4a"/><path d="M220 118V83" stroke="#58453d" stroke-width="5"/><path d="M160 230Q220 190 360 225" fill="none" stroke="#68cbe0" stroke-width="28"/><g transform="translate(300 204)"><ellipse rx="18" ry="11" fill="#777"/><circle cy="-5" r="5" fill="#999"/></g><g transform="translate(125 73)" fill="#f7ca54"><ellipse rx="10" ry="6"/><circle cx="-7" cy="-8" r="5"/><circle cx="7" cy="-8" r="5"/><circle cx="-3" cy="-2" r="2" fill="#69495d"/></g>${end}`,spots:[['cloud',8,4,25,27],['apple',10,10,25,34],['flag',52,24,23,25],['frog',77,66,20,26],['butterfly',29,17,18,23]]},
{name:"L'espai misteriós",left:`${baseStart}<rect width="360" height="260" fill="#20204d"/><g fill="#ffe37a"><circle cx="30" cy="30" r="3"/><circle cx="95" cy="62" r="4"/><circle cx="300" cy="35" r="3"/><circle cx="325" cy="95" r="4"/></g><circle cx="75" cy="180" r="52" fill="#b9b7cf"/><circle cx="55" cy="165" r="10" fill="#8f8da8"/><circle cx="87" cy="197" r="8" fill="#8f8da8"/><circle cx="102" cy="160" r="6" fill="#8f8da8"/><ellipse cx="282" cy="70" rx="45" ry="27" fill="#e99e62"/><ellipse cx="282" cy="70" rx="62" ry="12" fill="none" stroke="#ffd26a" stroke-width="7"/><path d="M180 195Q145 135 185 78Q225 135 190 195Z" fill="#efefef"/><circle cx="185" cy="122" r="18" fill="#63bfe5"/><path d="M168 183l-17 32M201 183l17 32" stroke="#ef6b4a" stroke-width="12"/><g transform="translate(292 198)" fill="#72d487" stroke="#17324d" stroke-width="3"><ellipse rx="25" ry="18"/><circle cx="-8" cy="-3" r="4"/><circle cx="8" cy="-3" r="4"/><path d="M-12-16l-8-17M12-16l8-17"/></g>${end}`,right:`${baseStart}<rect width="360" height="260" fill="#20204d"/><g fill="#ffe37a"><circle cx="30" cy="30" r="3"/><circle cx="95" cy="62" r="4"/><circle cx="300" cy="35" r="3"/></g><circle cx="75" cy="180" r="52" fill="#b9b7cf"/><circle cx="55" cy="165" r="10" fill="#8f8da8"/><circle cx="87" cy="197" r="8" fill="#8f8da8"/><ellipse cx="282" cy="70" rx="45" ry="27" fill="#e99e62"/><path d="M180 195Q145 135 185 78Q225 135 190 195Z" fill="#efefef"/><rect x="167" y="105" width="36" height="36" rx="5" fill="#63bfe5"/><path d="M168 183l-17 32M201 183l17 32M185 190v29" stroke="#ef6b4a" stroke-width="12"/><g transform="translate(292 198)" fill="#72d487" stroke="#17324d" stroke-width="3"><ellipse rx="25" ry="18"/><circle cx="-8" cy="-3" r="4"/><circle cx="8" cy="-3" r="4"/><path d="M0-17v-20"/></g>${end}`,spots:[['stars',78,5,20,30],['crater',18,50,20,25],['ring',62,10,30,30],['window',42,34,20,25],['alien',73,62,23,30]]}
];
let profiles=JSON.parse(localStorage.getItem('perfilsNombres')||'null'),active=null,found=new Set(),current=0;if(!profiles){let old=Math.max(0,Number(localStorage.getItem('estrellasLucaMatematicas'))||15);profiles=[{id:'luca',name:'Luca',avatar:'🐉',lang:'ca',level:6,stars:old,differenceLevel:1},{id:'cloe',name:'Cloe',avatar:'🦄',lang:'ca',level:1,stars:0,differenceLevel:1}];save()}profiles.forEach(p=>p.differenceLevel=p.differenceLevel||1);save();
function save(){localStorage.setItem('perfilsNombres',JSON.stringify(profiles))}function speak(t){speechSynthesis.cancel();let u=new SpeechSynthesisUtterance(t);u.lang='ca-ES';let v=speechSynthesis.getVoices().find(x=>x.lang.toLowerCase().startsWith('ca'));if(v)u.voice=v;u.rate=.72;u.pitch=1.12;speechSynthesis.speak(u)}function renderProfiles(){$('profileList').innerHTML='';profiles.forEach(p=>{let b=document.createElement('button');b.className='profile';b.innerHTML=`<span>${p.avatar}</span>${p.name}<small>Nivell ${p.differenceLevel} · ⭐ ${p.stars}</small>`;b.onclick=()=>select(p.id);$('profileList').appendChild(b)})}function select(id){active=profiles.find(p=>p.id===id);current=Math.min(levels.length,active.differenceLevel)-1;$('profiles').classList.add('hidden');$('play').classList.remove('hidden');loadLevel()}
function loadLevel(){found=new Set();let l=levels[current];$('level').textContent=`NIVELL ${current+1}`;$('stars').textContent=`⭐ ${active.stars}`;$('counter').textContent='0 / 5';$('title').textContent=l.name;$('message').textContent='Toca una diferència a qualsevol dibuix.';$('next').classList.add('hidden');drawSide('left',l.left,l.spots);drawSide('right',l.right,l.spots);speak('Troba les cinc diferències. Toca una diferència a qualsevol dels dos dibuixos.')}function drawSide(id,svg,spots){let el=$(id);el.innerHTML=svg;spots.forEach(([key,x,y,w,h])=>{let b=document.createElement('button');b.className='hit';b.dataset.diff=key;b.setAttribute('aria-label','Diferència');Object.assign(b.style,{left:x+'%',top:y+'%',width:w+'%',height:h+'%'});b.onclick=e=>{e.stopPropagation();correct(key)};el.appendChild(b)});el.onclick=e=>{if(!e.target.closest('.hit'))wrong()}}
function correct(key){if(found.has(key))return;found.add(key);active.stars++;save();document.querySelectorAll(`.hit[data-diff="${key}"]`).forEach(x=>x.classList.add('found'));$('stars').textContent=`⭐ ${active.stars}`;$('counter').textContent=`${found.size} / 5`;$('message').textContent='BRAVO! Has trobat una diferència.';party();speak('BRAVO! Has trobat una diferència.');if(found.size===5){if(current<levels.length-1){active.differenceLevel=Math.max(active.differenceLevel,current+2);save();$('next').classList.remove('hidden');$('message').textContent='Molt bé! Has desbloquejat un nivell més difícil!';speak('Molt bé! Has trobat les cinc diferències i has desbloquejat un nivell més difícil.')}else{$('message').textContent='INCREÏBLE! Has superat tots els nivells!';speak('Increïble! Has superat tots els nivells!')}}}function wrong(){active.stars=Math.max(0,active.stars-1);save();$('stars').textContent=`⭐ ${active.stars}`;$('message').textContent='Aquí no. Has perdut una estrella.';speak('Aquí no. Has perdut una estrella. Torna-ho a provar.')}function party(){let g=$('game');g.classList.add('party');setTimeout(()=>g.classList.remove('party'),1000);for(let i=0;i<9;i++){let x=document.createElement('div');x.className='confetti';x.textContent=['⭐','🎉','🔎'][i%3];x.style.left=Math.random()*100+'vw';document.body.appendChild(x);setTimeout(()=>x.remove(),1900)}}
$('back').onclick=()=>{$('play').classList.add('hidden');$('profiles').classList.remove('hidden');renderProfiles();speak('Tria un jugador.')};$('next').onclick=()=>{current++;loadLevel()};renderProfiles();speak('Tria qui vol buscar les diferències.');
</script>
