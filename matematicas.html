<!doctype html>
<html lang="ca">
<head>
<meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
<meta name="theme-color" content="#e53935"><meta name="apple-mobile-web-app-capable" content="yes"><meta name="apple-mobile-web-app-status-bar-style" content="black-translucent"><meta name="apple-mobile-web-app-title" content="Nombres"><link rel="manifest" href="manifest.webmanifest">
<title>L'aventura dels nombres</title>
<style>
:root{--ink:#17324d;--red:#e53935;--yellow:#ffca28;--blue:#35a7d6;--cream:#fff7d6}*{box-sizing:border-box}body{margin:0;min-height:100vh;font-family:system-ui,sans-serif;color:var(--ink);background:linear-gradient(145deg,var(--yellow) 0 28%,var(--red) 28% 34%,var(--blue) 34% 100%);display:grid;place-items:center}.card{width:min(960px,95vw);min-height:90vh;background:linear-gradient(#fffef8,var(--cream));border:8px solid #fff3b0;border-radius:34px;padding:clamp(18px,4vw,42px);text-align:center;box-shadow:0 22px 70px #17324d99;overflow:hidden;position:relative}h1{font-size:clamp(2rem,6vw,4rem);margin:.15em}.big{font-size:clamp(4rem,13vw,8rem);margin:.08em}.subtitle{font-size:clamp(1.05rem,3vw,1.55rem);font-weight:700}.hidden{display:none!important}button{border:0;border-radius:22px;padding:.7em 1em;font-size:clamp(1.1rem,3vw,1.8rem);font-weight:900;cursor:pointer;margin:9px;background:var(--yellow);color:var(--ink);box-shadow:0 7px 0 #b58d33}button:active{transform:translateY(5px);box-shadow:0 2px #b58d33}.top{display:flex;justify-content:space-between;align-items:center;gap:8px}.badge{background:var(--ink);color:white;padding:10px 15px;border-radius:18px;font-weight:900}.level{background:#ffe082;border:3px solid var(--red);color:#8b1a1a;border-radius:18px;padding:8px 14px;font-weight:900}.profiles{display:flex;flex-wrap:wrap;justify-content:center;gap:14px;margin:25px auto}.profile{min-width:180px;background:white;border:4px solid #8bd3ee;box-shadow:0 7px 0 #5798b0}.profile .avatar{display:block;font-size:3.3rem}.add{border-style:dashed}.setup{max-width:620px;margin:auto}.nameInput,.numberInput{display:block;width:min(380px,85%);margin:18px auto;padding:.2em;text-align:center;font-size:clamp(2rem,7vw,4.5rem);font-weight:900;color:var(--ink);background:white;border:6px solid var(--red);border-radius:24px;outline:none}.nameInput{font-size:clamp(1.5rem,5vw,2.6rem)}.avatars{display:flex;justify-content:center;flex-wrap:wrap}.avatarBtn{font-size:2.5rem;padding:.25em;background:white;box-shadow:0 5px 0 #b8a45b}.avatarBtn.selected{outline:6px solid var(--blue)}.levels{display:grid;grid-template-columns:repeat(auto-fit,minmax(150px,1fr));gap:8px}.levelBtn{font-size:1rem;background:#fff;box-shadow:0 5px 0 #c7a94d}.levelBtn.selected{background:#ffe082;outline:4px solid var(--red)}.problem{font-size:clamp(3rem,12vw,7rem);font-weight:900;color:var(--red);text-shadow:3px 3px #ffe082;margin:.12em}.objects{font-size:clamp(1.8rem,5vw,3.3rem);letter-spacing:.12em;min-height:1.4em;overflow-wrap:anywhere}.answers{display:flex;justify-content:center;flex-wrap:wrap}.answer{min-width:125px;background:#dff6ff;box-shadow:0 7px 0 #72a9be}.progress{height:22px;background:#d9e1e8;border-radius:20px;overflow:hidden;margin:12px auto;max-width:520px}.progress>div{height:100%;background:linear-gradient(90deg,var(--yellow),var(--red));transition:width .4s}.party{animation:party .6s 2}@keyframes party{50%{transform:scale(1.04) rotate(1deg)}}.confetti{position:fixed;top:-10vh;font-size:2rem;animation:fall 1.8s linear forwards;z-index:9}@keyframes fall{to{transform:translateY(115vh) rotate(600deg)}}
</style><style>.languages,.modeSelect{display:flex;justify-content:center;flex-wrap:wrap}.langBtn{font-size:1.15rem;background:white;box-shadow:0 5px 0 #b8a45b}.langBtn.selected{outline:6px solid var(--blue)}.modeBtn{font-size:1rem;background:white;box-shadow:0 5px 0 #b8a45b}.modeBtn.selected{background:#dff6ff;outline:5px solid var(--blue)}.keypad{display:grid;grid-template-columns:repeat(3,minmax(68px,105px));justify-content:center;gap:8px;margin:10px auto}.keypad button{margin:0;padding:.45em;font-size:clamp(1.5rem,5vw,2.4rem)}.keypad .ok{background:#9be09f;box-shadow:0 6px 0 #5d9b61}.keypad .erase{background:#ffb3b3;box-shadow:0 6px 0 #b76868}.numberInput[readonly]{caret-color:transparent;user-select:none}</style></head>
<body><main class="card" id="card">
<section id="profilesScreen"><div class="big">🐉</div><h1>Qui juga? · ¿Quién juega? · Who's playing?</h1><p class="subtitle">Cada jugador té el seu idioma, les seves estrelles i el seu nivell.</p><div class="profiles" id="profiles"></div></section>
<section id="setupScreen" class="hidden setup"><div class="big">✨</div><h1>Jugador nou · Jugador nuevo · New player</h1><input id="playerName" class="nameInput" maxlength="16" placeholder="Nom · Nombre · Name" autocomplete="off"><p class="subtitle">Idioma · Language</p><div class="languages" id="languages"></div><p class="subtitle">Personatge · Personaje · Character</p><div class="avatars" id="avatars"></div><p class="subtitle">Nivell inicial · Nivel inicial · Starting level</p><div class="levels" id="startLevels"></div><button id="createPlayer">COMENÇAR · EMPEZAR · START</button><button id="cancelSetup">TORNAR · VOLVER · BACK</button></section>
<section id="welcome" class="hidden"><div class="top"><button id="switchPlayer">👥 CANVIAR</button><div class="badge" id="welcomeStars"></div></div><div class="big" id="welcomeAvatar">🐉</div><h1 id="welcomeName"></h1><p class="subtitle" id="welcomeLevel"></p><div class="progress"><div id="welcomeProgress"></div></div><p id="welcomeProgressText"></p><p class="subtitle">TRIA COM VOLS ESCRIURE:</p><div class="modeSelect"><button class="modeBtn" id="screenMode">⌨️ TECLAT EN PANTALLA</button><button class="modeBtn" id="physicalMode">🖥️ TECLAT FÍSIC</button></div><button id="start">▶️ COMENÇAR</button></section>
<section id="game" class="hidden"><div class="top"><div class="level" id="level"></div><button id="levelUp">⬆️ PUJAR NIVELL</button><div class="badge" id="stars"></div></div><div class="big" id="icon">🚀</div><div class="objects" id="objects"></div><div class="problem" id="problem"></div><p class="subtitle" id="prompt"></p><div class="answers" id="answers"></div><p class="subtitle" id="status"></p><button id="changeInputMode">⌨️ CANVIAR TECLAT</button><button id="repeat">🔊 REPETIR</button><button id="leaveGame">⏸️ SORTIR</button></section>
</main>
<script src="voice-quality.js"></script><script>
const $=id=>document.getElementById(id),rnd=(a,b)=>Math.floor(Math.random()*(b-a+1))+a,avatars=['🐉','🦄','🦁','🐼','🦊','🐸','🚀','⚽'];
const langs={ca:{flag:'🟡🔴',name:'Català',voice:'ca-ES',levels:['Comptem','Sumes fins a 5','Sumes fins a 10','Restes petites','Fins a 20','Dues xifres','Portant-ne una','Repte expert'],start:'▶️ COMENÇAR',change:'👥 CANVIAR',leave:'⏸️ SORTIR',repeat:'🔊 REPETIR',choose:'Tria el resultat',type:'⌨️ ESCRIU EL RESULTAT I PREM OK',progress:n=>`${n} de 100 encerts per pujar de nivell`,missing:n=>`${n}/100 encerts per al nivell següent`,paper:'Pots fer servir el paper i el bolígraf! ',plus:'més',minus:'menys',needName:'Escriu un nom, si us plau.',hello:n=>`Hola, ${n}!`,level:'Nivell',levelUp:n=>`BRAVO! Has pujat al nivell ${n}!`},es:{flag:'🇪🇸',name:'Español',voice:'es-ES',levels:['Contamos','Sumas hasta 5','Sumas hasta 10','Restas pequeñas','Hasta 20','Dos cifras','Llevando una','Reto experto'],start:'▶️ EMPEZAR',change:'👥 CAMBIAR',leave:'⏸️ SALIR',repeat:'🔊 REPETIR',choose:'Elige el resultado',type:'⌨️ ESCRIBE EL RESULTADO Y PULSA OK',progress:n=>`${n} de 100 aciertos para subir de nivel`,missing:n=>`${n}/100 aciertos para el siguiente nivel`,paper:'¡Puedes usar el papel y el bolígrafo! ',plus:'más',minus:'menos',needName:'Escribe un nombre, por favor.',hello:n=>`¡Hola, ${n}!`,level:'Nivel',levelUp:n=>`¡BRAVO! ¡Has subido al nivel ${n}!`},en:{flag:'🇬🇧',name:'English',voice:'en-US',levels:['Counting','Sums up to 5','Sums up to 10','Small subtractions','Up to 20','Two digits','Carrying one','Expert challenge'],start:'▶️ START',change:'👥 SWITCH',leave:'⏸️ EXIT',repeat:'🔊 REPEAT',choose:'Choose the answer',type:'⌨️ TYPE THE ANSWER AND PRESS OK',progress:n=>`${n} of 100 correct answers to level up`,missing:n=>`${n}/100 correct answers to the next level`,paper:'You can use paper and a pencil! ',plus:'plus',minus:'minus',needName:'Please enter a name.',hello:n=>`Hello, ${n}!`,level:'Level',levelUp:n=>`BRAVO! You reached level ${n}!`}};
const levelNames=langs.ca.levels,params=new URLSearchParams(location.search);let profiles=JSON.parse(localStorage.getItem('perfilsNombres')||'null'),active=null,round=null,selectedAvatar='🐉',selectedLang=['ca','es','en'].includes(params.get('idioma'))?params.get('idioma'):'ca',selectedLevel=Math.min(8,Math.max(1,Number(params.get('nivell'))||1));
if(!profiles){let old=Math.max(0,Number(localStorage.getItem('estrellasLucaMatematicas'))||15);profiles=[{id:'luca',name:'Luca',avatar:'🐉',lang:'ca',level:6,stars:old,correct:0,levelCorrect:0},{id:'cloe',name:'Cloe',avatar:'🦄',lang:'ca',level:1,stars:0,correct:0,levelCorrect:0}];saveProfiles()}profiles.forEach(p=>{p.lang=p.lang||'ca';p.mathInputMode=p.mathInputMode||'screen'});saveProfiles();
function saveProfiles(){localStorage.setItem('perfilsNombres',JSON.stringify(profiles))}
function L(){return langs[active?.lang||selectedLang]||langs.ca}function speak(text,next){let l=L();sayGameText(text,l.voice,next,l.voice==='ca-ES'?.76:.8)}
function numberWord(n,lang=active?.lang||selectedLang){const units={ca:['zero','un','dos','tres','quatre','cinc','sis','set','vuit','nou','deu','onze','dotze','tretze','catorze','quinze','setze','disset','divuit','dinou'],es:['cero','uno','dos','tres','cuatro','cinco','seis','siete','ocho','nueve','diez','once','doce','trece','catorce','quince','dieciséis','diecisiete','dieciocho','diecinueve'],en:['zero','one','two','three','four','five','six','seven','eight','nine','ten','eleven','twelve','thirteen','fourteen','fifteen','sixteen','seventeen','eighteen','nineteen']}[lang];if(n<20)return units[n];if(n===100)return{ca:'cent',es:'cien',en:'one hundred'}[lang];const tens={ca:['','','vint','trenta','quaranta','cinquanta','seixanta','setanta','vuitanta','noranta'],es:['','','veinte','treinta','cuarenta','cincuenta','sesenta','setenta','ochenta','noventa'],en:['','','twenty','thirty','forty','fifty','sixty','seventy','eighty','ninety']}[lang];let z=Math.floor(n/10),x=n%10;if(!x)return tens[z];if(lang==='ca')return tens[z]+(z===2?'-i-':'-')+units[x];if(lang==='es'&&z===2)return'veinti'+units[x];return tens[z]+(lang==='es'?' y ':'-')+units[x]}
function renderProfiles(){profiles=$safe(profiles);$('profiles').innerHTML='';profiles.forEach(p=>{let b=document.createElement('button'),l=langs[p.lang]||langs.ca;b.className='profile';b.innerHTML=`<span class="avatar">${p.avatar}</span>${escapeHtml(p.name)}<small style="display:block">${l.flag} ${l.level} ${p.level} · ⭐ ${p.stars}</small>`;b.onclick=()=>selectProfile(p.id);$('profiles').appendChild(b)});let add=document.createElement('button');add.className='profile add';add.innerHTML='<span class="avatar">➕</span>NOU · NUEVO · NEW';add.onclick=showSetup;$('profiles').appendChild(add)}
function $safe(v){return Array.isArray(v)?v:[]}
function escapeHtml(s){return String(s).replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]))}
function showSetup(){$('profilesScreen').classList.add('hidden');$('setupScreen').classList.remove('hidden');$('playerName').value=params.get('nom')||'';renderSetup();setTimeout(()=>$('playerName').focus(),100)}
function renderSetup(){$('languages').innerHTML='';Object.entries(langs).forEach(([code,l])=>{let b=document.createElement('button');b.className='langBtn'+(selectedLang===code?' selected':'');b.textContent=`${l.flag} ${l.name}`;b.onclick=()=>{selectedLang=code;renderSetup()};$('languages').appendChild(b)});$('avatars').innerHTML='';avatars.forEach(a=>{let b=document.createElement('button');b.className='avatarBtn'+(a===selectedAvatar?' selected':'');b.textContent=a;b.onclick=()=>{selectedAvatar=a;renderSetup()};$('avatars').appendChild(b)});$('startLevels').innerHTML='';L().levels.forEach((n,i)=>{let b=document.createElement('button');b.className='levelBtn'+(selectedLevel===i+1?' selected':'');b.innerHTML=`${L().level} ${i+1}<small style="display:block">${n}</small>`;b.onclick=()=>{selectedLevel=i+1;renderSetup()};$('startLevels').appendChild(b)})}
function createPlayer(){let name=$('playerName').value.trim();if(!name){speak(L().needName);$('playerName').focus();return}let id=Date.now().toString(36);profiles.push({id,name,avatar:selectedAvatar,lang:selectedLang,level:selectedLevel,stars:0,correct:0,levelCorrect:0,mathInputMode:'screen'});saveProfiles();selectProfile(id)}
function renderInputModes(){$('screenMode').classList.toggle('selected',active.mathInputMode==='screen');$('physicalMode').classList.toggle('selected',active.mathInputMode==='physical')}
function setInputMode(mode){active.mathInputMode=mode;saveProfiles();renderInputModes();updateKeyboardView()}
function selectProfile(id){active=profiles.find(p=>p.id===id);if(!active)return;localStorage.setItem('perfilActiu',id);let l=L();$('profilesScreen').classList.add('hidden');$('setupScreen').classList.add('hidden');$('game').classList.add('hidden');$('welcome').classList.remove('hidden');$('welcomeAvatar').textContent=active.avatar;$('welcomeName').textContent=l.hello(active.name);$('welcomeLevel').textContent=`${l.level} ${active.level} · ${l.levels[active.level-1]}`;$('welcomeStars').textContent=`⭐ ${active.stars}`;$('welcomeProgress').style.width=active.levelCorrect+'%';$('welcomeProgressText').textContent=l.progress(active.levelCorrect);$('start').textContent=l.start;$('switchPlayer').textContent=l.change;$('leaveGame').textContent=l.leave;$('repeat').textContent=l.repeat;renderInputModes()}
function makeRound(level){let a,b,op='+',visual='',paper=false;if(level===1){a=rnd(1,2);b=rnd(1,2);visual='🍎'}else if(level===2){a=rnd(1,4);b=rnd(1,5-a);visual='⭐'}else if(level===3){a=rnd(2,8);b=rnd(1,10-a)}else if(level===4){a=rnd(3,10);b=rnd(1,Math.min(2,a-1));op='−';visual='🍪'}else if(level===5){op=Math.random()<.35?'−':'+';if(op==='+'){a=rnd(3,12);b=rnd(2,20-a)}else{a=rnd(7,20);b=rnd(1,Math.min(8,a-1))}}else if(level===6){op=Math.random()<.3?'−':'+';if(op==='+'){do{a=rnd(11,48);b=rnd(10,39)}while(a%10+b%10>9||a+b>79)}else{do{a=rnd(22,69);b=rnd(11,a-1)}while(a%10<b%10)}}else if(level===7){do{a=rnd(16,58);b=rnd(12,39)}while(a%10+b%10<10||a+b>89);paper=true}else{op=Math.random()<.35?'−':'+';if(op==='+'){a=rnd(24,69);b=rnd(12,Math.min(30,99-a));paper=a%10+b%10>=10}else{do{a=rnd(45,99);b=rnd(12,a-1)}while(a%10<b%10)}}let answer=op==='+'?a+b:a-b;return{a,b,op,answer,visual,paper}}
function readRound(r){let l=L(),p=r.paper?l.paper:'';return`${p}${numberWord(r.a)} ${r.op==='+'?l.plus:l.minus} ${numberWord(r.b)}.`}
function updateKeyboardView(){if(!active)return;let keypad=$('keypad');if(keypad)keypad.classList.toggle('hidden',active.mathInputMode==='physical');if(!$('game').classList.contains('hidden'))$('prompt').textContent=active.mathInputMode==='physical'?'🖥️ ESCRIU AMB EL TECLAT FÍSIC I PREM ENTER':'⌨️ ESCRIU AMB EL TECLAT DE LA PANTALLA I PREM OK';$('changeInputMode').textContent=active.mathInputMode==='physical'?'⌨️ MOSTRAR TECLAT EN PANTALLA':'🖥️ UTILITZAR TECLAT FÍSIC'}
function showRound(){let level=Math.min(8,Math.max(1,Number(active.level)||1));active.level=level;round=makeRound(level);let l=L();$('level').textContent=`${l.level} ${level} · ${l.levels[level-1]}`;$('levelUp').disabled=level>=8;$('levelUp').textContent=level>=8?'🏆 NIVELL MÀXIM':'⬆️ PUJAR NIVELL';$('stars').textContent=`⭐ ${active.stars}`;$('icon').textContent=active.avatar;$('problem').textContent=`${round.a} ${round.op} ${round.b} = ?`;$('objects').textContent=round.visual?round.visual.repeat(round.a)+'  '+round.op+'  '+round.visual.repeat(round.b):'';$('status').textContent=l.missing(active.levelCorrect);$('answers').innerHTML='<input id="numberAnswer" class="numberInput" type="text" inputmode="none" readonly aria-label="RESULTAT"><div class="keypad" id="keypad"></div>';let input=$('numberAnswer'),keys=['1','2','3','4','5','6','7','8','9','⌫','0','OK'];keys.forEach(key=>{let b=document.createElement('button');b.textContent=key;if(key==='OK')b.className='ok';if(key==='⌫')b.className='erase';b.onclick=()=>{if(key==='OK'){if(input.value!=='')check(Number(input.value))}else if(key==='⌫')input.value=input.value.slice(0,-1);else if(input.value.length<3)input.value+=key};$('keypad').appendChild(b)});updateKeyboardView();speak(readRound(round))}
function focusAnswer(){}
function check(value){if(Number(value)===round.answer){active.stars++;active.correct++;active.levelCorrect++;let leveled=false;if(active.levelCorrect>=100&&active.level<8){active.level++;active.levelCorrect=0;leveled=true}saveProfiles();party();let msg=leveled?L().levelUp(numberWord(active.level)):'BRAVO!';speak(msg);setTimeout(showRound,900)}else{active.stars=Math.max(0,active.stars-1);saveProfiles();$('stars').textContent=`⭐ ${active.stars}`;let input=$('numberAnswer');if(input)input.value='';speak(readRound(round))}}
function party(){let c=$('card');c.classList.add('party');setTimeout(()=>c.classList.remove('party'),1300);for(let i=0;i<14;i++){let x=document.createElement('div');x.className='confetti';x.textContent=['🎉','⭐','✨'][i%3];x.style.left=Math.random()*100+'vw';x.style.animationDelay=Math.random()*.4+'s';document.body.appendChild(x);setTimeout(()=>x.remove(),2200)}}
function leave(){speechSynthesis.cancel();selectProfile(active.id)}
function manualLevelUp(){if(!active||active.level>=8)return;active.level++;active.levelCorrect=0;saveProfiles();showRound()}
function physicalKeyboard(e){if($('game').classList.contains('hidden')||active?.mathInputMode!=='physical')return;let input=$('numberAnswer');if(!input)return;if(/^\d$/.test(e.key)){e.preventDefault();if(input.value.length<3)input.value+=e.key}else if(e.key==='Backspace'){e.preventDefault();input.value=input.value.slice(0,-1)}else if(e.key==='Enter'&&input.value!==''){e.preventDefault();check(Number(input.value))}}
document.addEventListener('keydown',physicalKeyboard);
$('levelUp').onclick=manualLevelUp;$('screenMode').onclick=()=>setInputMode('screen');$('physicalMode').onclick=()=>setInputMode('physical');$('changeInputMode').onclick=()=>setInputMode(active.mathInputMode==='physical'?'screen':'physical');$('createPlayer').onclick=createPlayer;$('cancelSetup').onclick=()=>{$('setupScreen').classList.add('hidden');$('profilesScreen').classList.remove('hidden');renderProfiles()};$('start').onclick=()=>{$('welcome').classList.add('hidden');$('game').classList.remove('hidden');showRound()};$('repeat').onclick=()=>speak(readRound(round),focusAnswer);$('leaveGame').onclick=leave;$('switchPlayer').onclick=()=>{active=null;$('welcome').classList.add('hidden');$('profilesScreen').classList.remove('hidden');renderProfiles()};
let perfilActiu=params.get('jugador')||localStorage.getItem('perfilActiu');if(params.get('nou')==='1'){showSetup()}else if(perfilActiu&&profiles.some(p=>p.id===perfilActiu)){selectProfile(perfilActiu)}else{$('setupScreen').classList.add('hidden');$('welcome').classList.add('hidden');$('game').classList.add('hidden');$('profilesScreen').classList.remove('hidden');renderProfiles()}
</script></body></html>
