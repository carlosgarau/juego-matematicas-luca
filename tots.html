<!doctype html>
<html lang="ca"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover"><meta name="theme-color" content="#ef7b45"><title>Una mica de tot</title><style>:root{--ink:#20304a;--gold:#ffd166;--orange:#ef7b45}*{box-sizing:border-box}body{margin:0;min-height:100vh;font-family:system-ui,sans-serif;color:var(--ink);background:linear-gradient(135deg,#64ced8,#ffd166,#ef8db2);display:grid;place-items:center}.game{width:min(930px,96vw);min-height:91vh;background:#fffaf1;border:7px solid white;border-radius:30px;padding:clamp(14px,4vw,34px);text-align:center;box-shadow:0 18px 55px #20304a66}h1{font-size:clamp(2rem,6vw,3.8rem);margin:.2em}.hidden{display:none!important}button{border:0;border-radius:18px;background:var(--gold);color:var(--ink);font:inherit;font-weight:850;padding:12px 18px;margin:7px;box-shadow:0 6px 0 #b48e30;cursor:pointer}.profiles{display:flex;justify-content:center;flex-wrap:wrap;gap:12px;margin:22px}.profile span{display:block;font-size:3rem}.profile small{display:block}.top{display:flex;justify-content:space-between;align-items:center;gap:8px;flex-wrap:wrap}.badge{background:var(--ink);color:white;border-radius:15px;padding:9px 13px;font-weight:800}.problem{font-size:clamp(3rem,12vw,7rem);font-weight:900;color:#d84b4b;margin:.2em}.target{font-size:clamp(2.5rem,9vw,5.5rem);font-weight:900;color:#6848bb;margin:.4em}.number{width:min(300px,80%);font-size:4rem;font-weight:900;text-align:center;border:5px solid #e85d5d;border-radius:18px}.memory{display:grid;grid-template-columns:repeat(4,1fr);gap:10px;max-width:520px;margin:20px auto}.mcard{aspect-ratio:1;font-size:3rem;background:#7254bd;color:white}.mcard.open,.mcard.done{background:white;color:var(--ink)}.diffs{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin:20px auto;max-width:760px}.diffrow{display:grid;grid-template-columns:repeat(5,1fr);gap:4px;background:#dff5f7;padding:10px;border-radius:18px}.diffitem{font-size:clamp(2rem,7vw,4rem);background:white;box-shadow:none;padding:5px}.message{font-size:clamp(1.1rem,3vw,1.5rem);font-weight:800;min-height:1.5em}.party{animation:party .55s 2}@keyframes party{50%{transform:scale(1.03)}}@media(max-width:480px){.game{width:100vw;border:0;border-radius:0;padding:9px}.diffs{gap:3px}.diffrow{padding:4px}.diffitem{padding:2px}}</style><style>body,button,input,a,h1,h2,h3,p,small,span{ text-transform:uppercase }</style></head><body><main class="game" id="game">
<section id="profiles"><div style="font-size:5rem">🎡</div><h1>Una mica de tot</h1><p>Matemàtiques, lectura, diferències i joc de memòria: una activitat de cada.</p><div class="profiles" id="profileList"></div><button onclick="location.href='matematicas.html?nou=1&amp;idioma=ca'">➕ JUGADOR NOU</button></section>
<section id="play" class="hidden"><div class="top"><button id="stop">⏸️ ACABAR</button><span class="badge" id="kind"></span><span class="badge" id="stars"></span></div><h1 id="title"></h1><p class="message" id="message"></p><div id="content"></div></section>
</main><script src="voice-quality.js"></script><script>
const $=x=>document.getElementById(x),SR=window.SpeechRecognition||window.webkitSpeechRecognition,norm=s=>String(s).toLowerCase().normalize('NFD').replace(/[\u0300-\u036f]/g,'').replace(/[^a-zç ]/g,'').replace(/\s+/g,' ').trim();let profiles=JSON.parse(localStorage.getItem('perfilsNombres')||'null'),active=null,phase=0,answer=0,target='',done=false,rec=null,heard=[];if(!profiles){let old=Math.max(0,Number(localStorage.getItem('estrellasLucaMatematicas'))||15);profiles=[{id:'luca',name:'Luca',avatar:'🐉',lang:'ca',level:6,stars:old},{id:'cloe',name:'Cloe',avatar:'🦄',lang:'ca',level:1,stars:0}];save()}save();function save(){localStorage.setItem('perfilsNombres',JSON.stringify(profiles))}function speak(t,next){sayGameText(t,'ca-ES',next,.78)}
function renderProfiles(){$('profileList').innerHTML='';profiles.forEach(p=>{let b=document.createElement('button');b.className='profile';b.innerHTML=`<span>${p.avatar}</span>${p.name}<small>⭐ ${p.stars}</small>`;b.onclick=()=>select(p.id);$('profileList').appendChild(b)})}function select(id){active=profiles.find(p=>p.id===id);if(!active)return;localStorage.setItem('perfilActiu',id);phase=0;$('profiles').classList.add('hidden');$('play').classList.remove('hidden');nextPhase()}
function nextPhase(){done=false;$('stars').textContent=`⭐ ${active.stars}`;$('content').innerHTML='';$('message').textContent='';if(phase%4===0)math();else if(phase%4===1)reading();else if(phase%4===2)differences();else memory();phase++}function win(points=1){if(done)return;done=true;active.stars+=points;save();$('stars').textContent=`⭐ ${active.stars}`;$('message').textContent=`BRAVO! +${points} ⭐`;$('game').classList.add('party');setTimeout(()=>$('game').classList.remove('party'),900);speak('BRAVO!',()=>setTimeout(nextPhase,550))}function lose(){active.stars=Math.max(0,active.stars-1);save();$('stars').textContent=`⭐ ${active.stars}`;$('message').textContent='Has perdut una estrella. Torna-ho a provar.';speak('Torna-ho a provar.')}
function caNumber(n){return['zero','un','dos','tres','quatre','cinc','sis','set','vuit','nou','deu','onze','dotze','tretze','catorze','quinze','setze','disset','divuit','dinou','vint'][n]}function math(){let max=active.level<=2?5:active.level<=4?10:20,a=Math.floor(Math.random()*(max-2))+1,b=Math.floor(Math.random()*(max-a))+1;answer=a+b;$('kind').textContent='➕ MATEMÀTIQUES';$('title').textContent='Calcula el resultat';$('content').innerHTML=`<div class="problem">${a} + ${b} = ?</div><input class="number" id="num" type="number" inputmode="numeric">`;$('num').onkeydown=e=>{if(e.key==='Enter'&&e.target.value!=='')Number(e.target.value)===answer?win():lose()};speak(`${caNumber(a)} més ${caNumber(b)}. Escriu el resultat i prem la tecla Enter.`,()=>$('num').focus())}
const words=['GAT','LLUNA','DRAC FELIÇ','EL VAIXELL NAVEGA','LA GRANOTA SALTA MOLT'];function reading(){target=words[Math.min(words.length-1,Math.max(0,(active.readingStage||1)-1))];heard=[];$('kind').textContent='📚 LECTURA';$('title').textContent='Llegeix en veu alta';$('content').innerHTML=`<div class="target">${target}</div><button id="mic">🎙️ ESCOLTAR</button><button id="adult">✅ L'HA LLEGIT BÉ</button>`;$('mic').onclick=listen;$('adult').onclick=()=>win(target.split(' ').length);speak('Llegeix les paraules en veu alta.',listen)}function listen(){if(done)return;if(!SR){$('message').textContent="Prem el botó si ho ha llegit bé.";return}rec=new SR();rec.lang='ca-ES';rec.interimResults=false;rec.onresult=e=>{heard.push(e.results[0][0].transcript);let all=norm(heard.join(' ')),goal=norm(target);$('message').textContent=`He sentit: ${heard.join(' ')}`;if(all.replace(/ /g,'').includes(goal.replace(/ /g,'')))win(target.split(' ').length);else setTimeout(listen,250)};rec.onerror=()=>{$('message').textContent="Prem el botó si ho ha llegit bé."};try{rec.start()}catch(e){}}
function differences(){let base=['🌞','🏠','🌳','🚗','🐶'],right=[...base],idx=Math.floor(Math.random()*5),alts=['🌙','🏰','🌲','🚕','🐱'];right[idx]=alts[idx];$('kind').textContent='🔎 DIFERÈNCIES';$('title').textContent='Troba una diferència';let make=(arr,side)=>`<div class="diffrow">${arr.map((x,i)=>`<button class="diffitem" data-i="${i}" data-side="${side}">${x}</button>`).join('')}</div>`;$('content').innerHTML=`<div class="diffs">${make(base,'l')}${make(right,'r')}</div>`;document.querySelectorAll('.diffitem').forEach(b=>b.onclick=()=>Number(b.dataset.i)===idx?win():lose());speak('Troba la diferència entre els dos dibuixos i toca-la.')}
function memory(){let deck=['🐉','🚀','🐉','🚀'].sort(()=>Math.random()-.5),opened=[],pairs=0,lock=false;$('kind').textContent='🧠 JOC DE MEMÒRIA';$('title').textContent='Troba les dues parelles';$('content').innerHTML=`<div class="memory">${deck.map((x,i)=>`<button class="mcard" data-v="${x}" data-i="${i}">?</button>`).join('')}</div>`;document.querySelectorAll('.mcard').forEach(c=>c.onclick=()=>{if(lock||c.classList.contains('open')||c.classList.contains('done'))return;c.classList.add('open');c.textContent=c.dataset.v;opened.push(c);if(opened.length===2){lock=true;let[a,b]=opened;if(a.dataset.v===b.dataset.v){setTimeout(()=>{a.classList.add('done');b.classList.add('done');opened=[];lock=false;pairs++;active.stars++;save();$('stars').textContent=`⭐ ${active.stars}`;speak('BRAVO! Una parella.');if(pairs===2){done=true;setTimeout(nextPhase,700)}},350)}else setTimeout(()=>{a.classList.remove('open');b.classList.remove('open');a.textContent=b.textContent='?';opened=[];lock=false;speak('No són iguals. Recorda on eren.')},700)}});speak('Gira dues cartes cada vegada i troba les dues parelles.')}
$('stop').onclick=()=>{speechSynthesis.cancel();$('play').classList.add('hidden');$('profiles').classList.remove('hidden');renderProfiles();speak('Tria un jugador.')};renderProfiles();let perfilActiu=new URLSearchParams(location.search).get('jugador')||localStorage.getItem('perfilActiu');if(perfilActiu&&profiles.some(p=>p.id===perfilActiu))select(perfilActiu);else speak('Tria qui jugarà a una mica de tot.');
</script>
</body></html>
