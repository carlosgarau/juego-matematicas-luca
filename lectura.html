<!doctype html>
<html lang="ca"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover"><meta name="theme-color" content="#6a4bc4"><title>L'illa de les paraules</title>
<style>:root{--ink:#22304a;--purple:#6a4bc4;--pink:#ff7aa8;--yellow:#ffd75e;--sea:#5ed0dc}*{box-sizing:border-box}body{margin:0;min-height:100vh;font-family:system-ui,sans-serif;color:var(--ink);background:linear-gradient(#6bd9e8 0 52%,#f6d77b 52%);display:grid;place-items:center}.card{width:min(960px,95vw);min-height:90vh;background:#fffdf5;border:8px solid white;border-radius:36px;padding:clamp(18px,4vw,42px);text-align:center;box-shadow:0 20px 65px #17324d77;overflow:hidden;position:relative}h1{font-size:clamp(2rem,6vw,4rem);margin:.15em}.big{font-size:clamp(4rem,14vw,8rem)}.subtitle{font-size:clamp(1.05rem,3vw,1.55rem);font-weight:750}.hidden{display:none!important}button{border:0;border-radius:22px;padding:.7em 1em;margin:9px;font-size:clamp(1rem,3vw,1.65rem);font-weight:900;color:var(--ink);background:var(--yellow);box-shadow:0 7px 0 #b4932d;cursor:pointer}button:active{transform:translateY(5px);box-shadow:0 2px #b4932d}.top{display:flex;justify-content:space-between;align-items:center;gap:8px}.badge{background:var(--ink);color:white;padding:10px 15px;border-radius:18px;font-weight:900}.profiles{display:flex;flex-wrap:wrap;justify-content:center;gap:14px;margin:24px}.profile{min-width:190px;background:#fff;border:4px solid var(--sea);box-shadow:0 7px 0 #429aa3}.profile span{display:block;font-size:3.2rem}.target{font-size:clamp(2.6rem,9vw,6rem);font-weight:950;color:var(--purple);line-height:1.15;margin:.35em auto;text-wrap:balance;text-shadow:3px 3px #eadfff}.map{font-size:clamp(2rem,6vw,3.5rem);letter-spacing:.12em}.progress{height:22px;background:#e3dff4;border-radius:20px;overflow:hidden;max-width:540px;margin:12px auto}.progress div{height:100%;background:linear-gradient(90deg,var(--pink),var(--purple));transition:width .4s}.mic{font-size:4rem;animation:pulse 1s infinite}@keyframes pulse{50%{transform:scale(1.17)}}.adult{background:#dbf6dc;box-shadow:0 7px 0 #6dad70}.party{animation:party .6s 2}@keyframes party{50%{transform:scale(1.04) rotate(1deg)}}.confetti{position:fixed;top:-10vh;font-size:2rem;z-index:9;animation:fall 1.8s linear forwards}@keyframes fall{to{transform:translateY(115vh) rotate(720deg)}}</style><style>body,button,input,a,h1,h2,h3,p,small,span{ text-transform:uppercase }</style></head>
<body><main class="card" id="card">
<section id="profilesScreen"><div class="big">🏝️</div><h1>L'illa de les paraules</h1><p class="subtitle">Tria un jugador. Guanyaràs una estrella per cada paraula llegida.</p><div class="profiles" id="profiles"></div><button onclick="location.href='matematicas.html?nou=1&amp;idioma=ca'">➕ JUGADOR NOU</button></section>
<section id="welcome" class="hidden"><div class="top"><button id="backProfiles">👥</button><div class="badge" id="welcomeStars"></div></div><div class="big" id="avatar"></div><h1 id="hello"></h1><p class="subtitle" id="stageName"></p><div class="progress"><div id="welcomeBar"></div></div><p id="welcomeProgress"></p><button id="start">▶️</button></section>
<section id="game" class="hidden"><div class="top"><div class="badge" id="stage"></div><div class="badge" id="stars"></div></div><div class="map" id="map">🏝️ · · · · 🏰</div><div class="target" id="target"></div><p class="subtitle" id="instruction"></p><div class="mic hidden" id="mic">🎙️</div><p class="subtitle" id="heard"></p><button id="listen">🎙️</button><button id="repeat">🔊</button><button id="adult" class="adult">✅</button><button id="exit">⏸️</button></section>
</main><script src="voice-quality.js"></script><script>
const $=x=>document.getElementById(x),norm=s=>String(s).toLowerCase().normalize('NFD').replace(/[\u0300-\u036f]/g,'').replace(/[^a-zñç ]/g,'').replace(/\s+/g,' ').trim(),SR=window.SpeechRecognition||window.webkitSpeechRecognition;
const text={ca:{voice:'ca-ES',hello:n=>`Hola, ${n}!`,stages:['Una paraula','Dues paraules','Tres paraules','Frase curta','Frase completa','Petita història'],choose:'Llegeix-ho en veu alta',listen:'🎙️ ESCOLTAR',repeat:'🔊 REPETIR',adult:"✅ L'HA LLEGIT BÉ",exit:'⏸️ SORTIR',bravo:['BRAVO!','MOLT BÉ!','GENIAL!'],again:'Torna-ho a provar.',heard:s=>`He sentit: ${s}`,progress:n=>`${n} de 20 lectures per arribar a la següent illa`},es:{voice:'es-ES',hello:n=>`¡Hola, ${n}!`,stages:['Una palabra','Dos palabras','Tres palabras','Frase corta','Frase completa','Pequeña historia'],choose:'Léelo en voz alta',listen:'🎙️ ESCUCHAR',repeat:'🔊 REPETIR',adult:'✅ LO HA LEÍDO BIEN',exit:'⏸️ SALIR',bravo:['¡BRAVO!','¡MUY BIEN!','¡GENIAL!'],again:'Inténtalo otra vez.',heard:s=>`He oído: ${s}`,progress:n=>`${n} de 20 lecturas para llegar a la siguiente isla`},en:{voice:'en-US',hello:n=>`Hello, ${n}!`,stages:['One word','Two words','Three words','Short phrase','Full sentence','Little story'],choose:'Read it out loud',listen:'🎙️ LISTEN',repeat:'🔊 REPEAT',adult:'✅ READ CORRECTLY',exit:'⏸️ EXIT',bravo:['BRAVO!','GREAT JOB!','AMAZING!'],again:'Try again.',heard:s=>`I heard: ${s}`,progress:n=>`${n} of 20 readings to reach the next island`}};
const banks={ca:[['casa','gat','lluna','pirata','vaixell','drac','pilota','estrella'],['gat negre','lluna plena','vaixell blau','drac feliç','gran tresor','pilota verda'],['el gat dorm','la lluna brilla','un drac vola','el vaixell navega','la pilota salta'],['el pirata troba or','la granota salta molt','el drac busca amics','la lluna mira el mar'],['el vaixell blau arriba a l’illa','un petit drac vola sobre el castell','la tortuga troba un tresor brillant'],['el pirata obre el mapa i comença una aventura','el drac i la granota travessen el bosc encantat','al final del camí troben un castell ple d’estrelles']],es:[['casa','gato','luna','pirata','barco','dragón','pelota','estrella'],['gato negro','luna llena','barco azul','dragón feliz','gran tesoro','pelota verde'],['el gato duerme','la luna brilla','un dragón vuela','el barco navega','la pelota salta'],['el pirata encuentra oro','la rana salta mucho','el dragón busca amigos','la luna mira el mar'],['el barco azul llega a la isla','un pequeño dragón vuela sobre el castillo','la tortuga encuentra un tesoro brillante'],['el pirata abre el mapa y empieza una aventura','el dragón y la rana atraviesan el bosque encantado','al final del camino encuentran un castillo lleno de estrellas']],en:[['house','cat','moon','pirate','boat','dragon','ball','star'],['black cat','full moon','blue boat','happy dragon','great treasure','green ball'],['the cat sleeps','the moon shines','a dragon flies','the boat sails','the ball bounces'],['the pirate finds gold','the frog jumps high','the dragon finds friends','the moon sees the sea'],['the blue boat reaches the island','a little dragon flies over the castle','the turtle finds a shining treasure'],['the pirate opens the map and starts an adventure','the dragon and the frog cross the enchanted forest','at the end of the path they find a castle full of stars']]};
let profiles=JSON.parse(localStorage.getItem('perfilsNombres')||'null'),active=null,target='',rec=null,listening=false,heardParts=[],roundDone=false;if(!profiles){let old=Math.max(0,Number(localStorage.getItem('estrellasLucaMatematicas'))||15);profiles=[{id:'luca',name:'Luca',avatar:'🐉',lang:'ca',level:6,stars:old,correct:0,levelCorrect:0,readingStage:1,readingCorrect:0},{id:'cloe',name:'Cloe',avatar:'🦄',lang:'ca',level:1,stars:0,correct:0,levelCorrect:0,readingStage:1,readingCorrect:0}];save()}profiles.forEach(p=>{p.lang=p.lang||'ca';p.readingStage=p.readingStage||1;p.readingCorrect=p.readingCorrect||0});save();
function save(){localStorage.setItem('perfilsNombres',JSON.stringify(profiles))}function L(){return text[active?.lang||'ca']||text.ca}function speak(s,next){let l=L();sayGameText(s,l.voice,next,l.voice==='ca-ES'?.76:.8)}
function renderProfiles(){$('profiles').innerHTML='';profiles.forEach(p=>{let b=document.createElement('button'),l=text[p.lang]||text.ca;b.className='profile';b.innerHTML=`<span>${p.avatar}</span>${p.name}<small style="display:block">${l.stages[p.readingStage-1]} · ⭐ ${p.stars}</small>`;b.onclick=()=>select(p.id);$('profiles').appendChild(b)})}
function select(id){active=profiles.find(p=>p.id===id);if(!active)return;localStorage.setItem('perfilActiu',id);let l=L();$('profilesScreen').classList.add('hidden');$('game').classList.add('hidden');$('welcome').classList.remove('hidden');$('avatar').textContent=active.avatar;$('hello').textContent=l.hello(active.name);$('stageName').textContent=l.stages[active.readingStage-1];$('welcomeStars').textContent=`⭐ ${active.stars}`;$('welcomeBar').style.width=(active.readingCorrect/20*100)+'%';$('welcomeProgress').textContent=l.progress(active.readingCorrect);$('start').textContent='▶️ '+l.choose;$('backProfiles').textContent='👥';setLabels()}
function setLabels(){let l=L();$('instruction').textContent=l.choose;$('listen').textContent=l.listen;$('repeat').textContent=l.repeat;$('adult').textContent=l.adult;$('exit').textContent=l.exit}
function next(){let l=L(),lang=active.lang||'ca',bank=(banks[lang]||banks.ca)[active.readingStage-1];target=bank[Math.floor(Math.random()*bank.length)];heardParts=[];roundDone=false;$('target').textContent=target.toLocaleUpperCase(l.voice);$('stage').textContent=l.stages[active.readingStage-1];$('stars').textContent=`⭐ ${active.stars}`;$('heard').textContent='';$('mic').classList.add('hidden');$('map').textContent='🏝️ '+Array.from({length:5},(_,i)=>i<Math.ceil(active.readingCorrect/4)?'⭐':'·').join(' ')+' 🏰';speak(l.choose,listen)}
function distance(a,b){let d=Array.from({length:b.length+1},(_,i)=>i);for(let i=1;i<=a.length;i++){let p=d;d=[i];for(let j=1;j<=b.length;j++)d[j]=Math.min(d[j-1]+1,p[j]+1,p[j-1]+(a[i-1]===b[j-1]?0:1))}return d[b.length]}
function matches(text){let a=norm(text).replace(/ /g,''),b=norm(target).replace(/ /g,'');return a.includes(b)||distance(a,b)<=Math.max(1,Math.floor(b.length*.12))}
function listen(){if(roundDone)return;if(!SR){$('heard').textContent=L().adult;return}if(listening)return;rec=new SR();rec.lang=L().voice;rec.interimResults=true;rec.continuous=true;rec.maxAlternatives=5;rec.onstart=()=>{listening=true;$('mic').classList.remove('hidden')};rec.onresult=e=>{let interim='';for(let i=e.resultIndex;i<e.results.length;i++){let t=e.results[i][0].transcript;if(e.results[i].isFinal)heardParts.push(t);else interim+=' '+t}let all=[...heardParts,interim].join(' ').trim();$('heard').textContent=all?L().heard(all):'';if(matches(all))correct()};rec.onerror=e=>{listening=false;$('mic').classList.add('hidden');if(e.error==='not-allowed')$('heard').textContent=L().adult};rec.onend=()=>{listening=false;$('mic').classList.add('hidden');if(!roundDone&&!$('game').classList.contains('hidden'))setTimeout(listen,250)};try{rec.start()}catch(e){}}
function correct(){if(roundDone)return;roundDone=true;if(rec)try{rec.stop()}catch(e){}let prize=norm(target).split(' ').filter(Boolean).length;active.stars+=prize;active.readingCorrect++;let up=false;if(active.readingCorrect>=20&&active.readingStage<6){active.readingStage++;active.readingCorrect=0;up=true}save();$('stars').textContent=`⭐ ${active.stars}`;party();let l=L(),cheers=l.bravo,lang=active.lang||'ca',reward={ca:prize===1?'UNA ESTRELLA':`${prize} ESTRELLES`,es:prize===1?'UNA ESTRELLA':`${prize} ESTRELLAS`,en:prize===1?'ONE STAR':`${prize} STARS`}[lang],won={ca:'HAS GUANYAT',es:'HAS GANADO',en:'YOU WON'}[lang],message=`${cheers[Math.floor(Math.random()*cheers.length)]} ${won} ${reward}!`+(up?' '+l.stages[active.readingStage-1]:'');speak(message,()=>setTimeout(next,500))}
function party(){let c=$('card');c.classList.add('party');setTimeout(()=>c.classList.remove('party'),1200);for(let i=0;i<14;i++){let x=document.createElement('div');x.className='confetti';x.textContent=['🎉','⭐','📚'][i%3];x.style.left=Math.random()*100+'vw';document.body.appendChild(x);setTimeout(()=>x.remove(),2000)}}
$('start').onclick=()=>{$('welcome').classList.add('hidden');$('game').classList.remove('hidden');next()};$('listen').onclick=listen;$('repeat').onclick=()=>speak(L().choose,listen);$('adult').onclick=correct;$('exit').onclick=()=>select(active.id);$('backProfiles').onclick=()=>{$('welcome').classList.add('hidden');$('profilesScreen').classList.remove('hidden');renderProfiles()};renderProfiles();let perfilActiu=new URLSearchParams(location.search).get('jugador')||localStorage.getItem('perfilActiu');if(perfilActiu&&profiles.some(p=>p.id===perfilActiu))select(perfilActiu);
</script>
</body></html>
