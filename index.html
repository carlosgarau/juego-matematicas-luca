<html lang="ca"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover"><meta name="theme-color" content="#e53935"><meta name="apple-mobile-web-app-capable" content="yes"><meta name="apple-mobile-web-app-status-bar-style" content="black-translucent"><meta name="apple-mobile-web-app-title" content="Nombres Luca"><link rel="manifest" href="manifest.webmanifest"><title>L'aventura dels nombres</title>
<style>
:root{--ink:#17324d;--yellow:#ffd166}*{box-sizing:border-box}body{margin:0;min-height:100vh;font-family:system-ui,sans-serif;color:var(--ink);background:radial-gradient(circle at 50% 20%,#4658a8,#17204f 70%);display:grid;place-items:center}.card{width:min(920px,94vw);min-height:88vh;background:#fffdf5;border:8px solid white;border-radius:34px;padding:clamp(18px,4vw,42px);text-align:center;box-shadow:0 20px 70px #0008;overflow:hidden}h1{font-size:clamp(2rem,6vw,4rem);margin:.1em}.big{font-size:clamp(4rem,14vw,8rem);margin:.08em}.problem{font-size:clamp(3rem,12vw,7rem);font-weight:900;color:#2457b2;margin:.12em}.objects{font-size:clamp(1.8rem,6vw,3.8rem);letter-spacing:.15em;min-height:1.5em}.subtitle{font-size:clamp(1.1rem,3vw,1.6rem);font-weight:700}.level{background:#e8f2ff;border-radius:20px;padding:10px 18px;display:inline-block;font-weight:800}button{border:0;border-radius:24px;padding:.7em 1em;font-size:clamp(1.3rem,4vw,2.2rem);font-weight:900;cursor:pointer;margin:10px;background:var(--yellow);box-shadow:0 7px 0 #b58d33}button:active{transform:translateY(5px);box-shadow:0 2px #b58d33}.answers{display:flex;justify-content:center;flex-wrap:wrap}.answer{min-width:125px;background:#dff6ff;box-shadow:0 7px 0 #72a9be}.hidden{display:none}.stars{float:right;font-size:1.5rem}.mic{font-size:3.5rem;animation:pulse 1s infinite}@keyframes pulse{50%{transform:scale(1.18)}}.party{animation:party .6s 2}@keyframes party{50%{transform:scale(1.04) rotate(1deg)}}.confetti{position:fixed;top:-10vh;font-size:2rem;animation:fall 1.8s linear forwards}@keyframes fall{to{transform:translateY(115vh) rotate(600deg)}}</style><style>body{background:linear-gradient(145deg,#ffca28 0 28%,#e53935 28% 34%,#35a7d6 34% 100%)}.card{background:linear-gradient(#fffef8,#fff7d6);border-color:#fff3b0}.level{background:#ffe082;border:3px solid #e53935;color:#8b1a1a}.problem{color:#d32f2f;text-shadow:3px 3px #ffe082}.stars{background:#17324d;color:white;padding:10px 16px;border-radius:18px}.numberInput{display:block;width:min(330px,80%);margin:18px auto;padding:.12em;text-align:center;font-size:clamp(3rem,10vw,6rem);font-weight:900;color:#17324d;background:white;border:6px solid #e53935;border-radius:24px;outline:none}.numberInput:focus{border-color:#ffca28;box-shadow:0 0 0 7px #ffca2855}</style></head>

<body><main class="card" id="card"><div class="stars" id="stars">⭐ 62 / 100</div>
<section id="welcome"><div class="big">🐉</div><h1>L'aventura dels nombres</h1><p class="subtitle">Sumes i restes amb en Luca</p><button id="start">▶️ COMENÇAR</button><p>Escolta l'operació, escriu el resultat i prem Enter.</p></section>
<section id="game" class="hidden"><div class="level" id="level"></div><div class="big" id="icon">🪐</div><div class="objects" id="objects"></div><div class="problem" id="problem"></div><p class="subtitle" id="prompt"></p><div class="mic hidden" id="mic">🎙️</div><div class="answers" id="answers"></div><p class="subtitle" id="status"></p><button id="repeat">🔊 REPETIR</button></section></main>
<script>
const baseRounds=[
{level:'Nivel 1 · Contamos',a:2,op:'+',b:1,visual:'🍎',say:'Luca, tienes dos manzanas y te doy una más. ¿Cuántas tienes ahora?',hint:'Cuenta conmigo: uno, dos... y una más: tres.'},
{level:'Nivel 1 · Contamos',a:3,op:'+',b:2,visual:'⭐',say:'Hay tres estrellas y aparecen dos más. ¿Cuántas hay en total?',hint:'Cuenta todas las estrellas despacio.'},
{level:'Nivel 1 · Quitamos',a:4,op:'−',b:1,visual:'🍪',say:'Tienes cuatro galletas y te comes una. ¿Cuántas quedan?',hint:'Empieza en cuatro y quita una: quedan tres.'},
{level:'Nivel 2 · Sin llevar',a:6,op:'+',b:3,say:'Seis más tres. Puedes empezar en seis y dar tres saltos hacia delante.',hint:'Desde seis: siete, ocho, nueve.'},
{level:'Nivel 2 · Sin llevar',a:12,op:'+',b:5,say:'Doce más cinco. Las unidades son dos más cinco. ¿Cuál es el resultado?',hint:'Dos más cinco son siete. La decena sigue siendo una: diecisiete.'},
{level:'Nivel 2 · Restamos poquito',a:9,op:'−',b:3,say:'Nueve menos tres. Empieza en nueve y da tres saltos hacia atrás. ¿Cuánto queda?',hint:'Desde nueve hacia atrás: ocho, siete, seis.'},
{level:'Nivel 3 · Decenas',a:20,op:'+',b:10,say:'Dos decenas más una decena. Veinte más diez. ¿Cuánto es?',hint:'Dos grupos de diez y uno más son tres grupos de diez: treinta.'},
{level:'Nivel 3 · Sin llevar',a:23,op:'+',b:14,say:'Veintitrés más catorce. Primero tres más cuatro, y después las decenas.',hint:'Tres más cuatro son siete. Dos decenas más una son tres. Treinta y siete.'},
{level:'Nivel 3 · Resta sin llevar',a:26,op:'−',b:4,say:'Veintiséis menos cuatro. Solo quitamos cuatro unidades. ¿Cuánto queda?',hint:'Desde veintiséis hacia atrás: veinticinco, veinticuatro, veintitrés, veintidós.'},
{level:'Nivel 4 · Preparamos una llevada',a:8,op:'+',b:2,say:'Ocho más dos completa un grupo de diez. ¿Cuánto es?',hint:'Desde ocho damos dos saltos: nueve, diez.'},
{level:'Nivel 4 · Llevamos una',a:18,op:'+',b:3,say:'Dieciocho más tres. Ocho más tres son once: escribimos un uno y llevamos una decena. ¿Cuál es el resultado?',hint:'Dieciocho más dos llega a veinte, y queda uno más: veintiuno.'},
{level:'Nivel 4 · Llevamos una',a:27,op:'+',b:15,say:'Reto final. Veintisiete más quince. Siete más cinco son doce: ponemos el dos y llevamos una decena. ¿Cuánto da?',hint:'Veintisiete más diez son treinta y siete, y cinco más son cuarenta y dos.'}
];
const rnd=(min,max)=>Math.floor(Math.random()*(max-min+1))+min;
function makeRounds(){
 const r=[];
 for(let k=0;k<5;k++){let a=rnd(2,8),b=rnd(2,9);r.push({level:'Nivell 1 · Sumes',a,op:'+',b})}
 for(let k=0;k<3;k++){let a=rnd(5,15),b=rnd(1,Math.min(6,a-1));r.push({level:'Nivell 1 · Restes petites',a,op:'−',b})}
 for(let k=0;k<4;k++){let a,b;do{a=rnd(11,48);b=rnd(11,39)}while(a%10+b%10>9||a+b>79);r.push({level:'Nivell 2 · Sumes de dues xifres',a,op:'+',b})}
 for(let k=0;k<3;k++){let a,b;do{a=rnd(22,59);b=rnd(11,a-1)}while(a%10<b%10);r.push({level:'Nivell 2 · Restes sense portar-ne',a,op:'−',b})}
 for(let k=0;k<2;k++)r.push({level:'Nivell 3 · Desenes',a:rnd(2,5)*10,op:'+',b:rnd(1,3)*10});
 for(let k=0;k<3;k++){let a,b;do{a=rnd(16,48);b=rnd(12,39)}while(a%10+b%10<10||a+b>89);r.push({level:'Nivell 4 · Sumes portant-ne una',a,op:'+',b})}
 return r;
}
let rounds=makeRounds();
const words={0:['cero'],1:['uno','una'],2:['dos'],3:['tres'],4:['cuatro'],5:['cinco'],6:['seis'],7:['siete'],8:['ocho'],9:['nueve'],10:['diez'],12:['doce'],17:['diecisiete'],21:['veintiuno','veintiun'],22:['veintidos'],30:['treinta'],37:['treintaysiete'],42:['cuarentaydos']};
if(!localStorage.getItem('mallorquiPuntuacioIniciada')){localStorage.setItem('estrellasLucaMatematicas','11');localStorage.setItem('mallorquiPuntuacioIniciada','1')}
if(!localStorage.getItem('catalaPuntuacio15')){localStorage.setItem('estrellasLucaMatematicas','15');localStorage.setItem('catalaPuntuacio15','1')}
let i=0,score=Math.max(0,Math.min(100,Number(localStorage.getItem('estrellasLucaMatematicas'))||0)),tries=0,correctFirst=0,failedQuestions=0,hadError=false,listening=false;const SR=window.SpeechRecognition||window.webkitSpeechRecognition;let rec;const $=x=>document.getElementById(x);const result=r=>r.op==='+'?r.a+r.b:r.a-r.b;
function saveScore(){localStorage.setItem('estrellasLucaMatematicas',String(score));$('stars').textContent='⭐ '+score+' / 100'}
function speak(t,next){speechSynthesis.cancel();let u=new SpeechSynthesisUtterance(t);u.lang='ca-ES';let catalana=speechSynthesis.getVoices().find(v=>v.lang.toLowerCase().startsWith('ca'));if(catalana)u.voice=catalana;u.rate=.68;u.pitch=1.16;u.volume=1;u.onend=()=>next&&next();speechSynthesis.speak(u)}
function norm(s){return String(s).toLowerCase().normalize('NFD').replace(/[\u0300-\u036f]/g,'').replace(/[^a-z0-9]/g,'')}
function nombreCatala(n){const u=['zero','un','dos','tres','quatre','cinc','sis','set','vuit','nou','deu','onze','dotze','tretze','catorze','quinze','setze','disset','divuit','dinou'];if(n<20)return u[n];if(n===100)return 'cent';const d=['','','vint','trenta','quaranta','cinquanta','seixanta','setanta','vuitanta','noranta'];let des=Math.floor(n/10),uni=n%10;if(!uni)return d[des];return d[des]+(des===2?'-i-':'-')+u[uni]}
function readOperation(r){let calPortar=r.op==='+'&&r.a>=10&&r.b>=10&&(r.a%10+r.b%10>=10);let paper=calPortar?'Pots fer servir el paper i el bolígraf! ':'';return `${paper}${nombreCatala(r.a)} ${r.op==='+'?'més':'menys'} ${nombreCatala(r.b)}.`}
function show(){if(score>=100){finish();return}if(i>=rounds.length){rounds=makeRounds();i=0}tries=0;hadError=false;let r=rounds[i];$('level').textContent=`⭐ ${score} de 100 · ${r.level}`;$('problem').textContent=`${r.a} ${r.op} ${r.b} = ?`;$('icon').textContent=i<3?'🐲':'🚀';$('objects').textContent='';$('prompt').textContent='⌨️ Escriu el resultat i prem Enter';$('status').textContent=`Et falten ${100-score} estrelles per arribar a 100`;$('answers').innerHTML='<input id="numberAnswer" class="numberInput" type="number" min="0" inputmode="numeric" autocomplete="off">';let input=$('numberAnswer');input.addEventListener('keydown',e=>{if(e.key==='Enter'&&input.value!=='')check(input.value)});speak(readOperation(r),()=>input.focus())}
function listen(){if(!rec){$('status').textContent='Puedes tocar la respuesta.';return}try{listening=true;$('mic').classList.remove('hidden');$('status').textContent='Te escucho…';rec.start()}catch(e){}}
function numberName(n){const units=['cero','uno','dos','tres','cuatro','cinco','seis','siete','ocho','nueve','diez','once','doce','trece','catorce','quince','dieciseis','diecisiete','dieciocho','diecinueve','veinte'];if(n<=20)return units[n];if(n<30)return 'veinti'+units[n-20];const tens=['','','veinte','treinta','cuarenta','cincuenta','sesenta','setenta','ochenta','noventa'];return n%10===0?tens[Math.floor(n/10)]:tens[Math.floor(n/10)]+'y'+units[n%10]}
function isRight(heard,ans){let n=norm(heard);return n.includes(String(ans))||n.includes(norm(numberName(ans)))||(words[ans]||[]).some(w=>n.includes(norm(w)))}
function party(){let card=$('card');card.classList.add('party');setTimeout(()=>card.classList.remove('party'),1300);for(let x=0;x<18;x++){let c=document.createElement('div');c.className='confetti';c.textContent=['🎉','⭐','✨'][x%3];c.style.left=Math.random()*100+'vw';c.style.animationDelay=Math.random()*.4+'s';document.body.appendChild(c);setTimeout(()=>c.remove(),2300)}}
function check(heard){let r=rounds[i],ans=result(r);if(isRight(heard,ans)){score=Math.min(100,score+1);saveScore();party();let message='BRAVO!';if(score<100&&score%10===0)message+=` Ja tens ${nombreCatala(score)} estrelles!`;speak(message,()=>{i++;setTimeout(show,500)})}else{score=Math.max(0,score-1);saveScore();let input=$('numberAnswer');input.value='';speak(readOperation(r),()=>input.focus())}}
function finish(){saveScore();$('level').textContent='100 ESTRELLES!';$('icon').textContent='🏆';$('objects').textContent='';$('problem').textContent='100 ⭐';$('prompt').textContent='Ho has aconseguit!';$('answers').innerHTML='';$('status').textContent='En Luca ha arribat a 100 estrelles.';party();speak('BRAVO, LUCA! Has arribat a cent estrelles!')}
if(SR){rec=new SR();rec.lang='es-ES';rec.interimResults=false;rec.maxAlternatives=4;rec.onresult=e=>check([...e.results[0]].map(x=>x.transcript).join(' '));rec.onerror=()=>{$('mic').classList.add('hidden');$('status').textContent='No te he oído. Puedes tocar la respuesta o pulsar repetir.'};rec.onend=()=>$('mic').classList.add('hidden')}
$('start').onclick=()=>{$('welcome').classList.add('hidden');$('game').classList.remove('hidden');show()};$('repeat').onclick=()=>speak(readOperation(rounds[i]),()=>{let input=$('numberAnswer');if(input)input.focus()});saveScore();
</script>
</body><div id="codex-agent-overlay-root" data-codex-agent-overlay-root="true"></div></html>
