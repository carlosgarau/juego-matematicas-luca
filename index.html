<!doctype html>
<html lang="ca"><head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
<meta name="theme-color" content="#ef7b45">
<link rel="manifest" href="manifest.webmanifest">
<title>L'aventura d'aprendre</title>
<style>
:root{--ink:#20304a}*{box-sizing:border-box}body{margin:0;min-height:100vh;font-family:system-ui,sans-serif;color:var(--ink);background:linear-gradient(135deg,#62cdd8,#ffd166,#ef8db2);display:grid;place-items:center}.home{width:min(980px,96vw);min-height:91vh;background:#fffaf1;border:7px solid white;border-radius:32px;padding:clamp(16px,4vw,38px);text-align:center;box-shadow:0 18px 55px #20304a66}h1{font-size:clamp(2.2rem,7vw,4.5rem);margin:.15em}.games{display:grid;grid-template-columns:repeat(auto-fit,minmax(210px,1fr));gap:15px;margin-top:25px}.game{display:block;text-decoration:none;color:var(--ink);background:white;border:4px solid #75c9d4;border-radius:24px;padding:20px 12px;box-shadow:0 7px 0 #4896a0;font-size:1.2rem;font-weight:850}.game span{display:block;font-size:4rem}.game.all{background:#fff0c6;border-color:#ef7b45;box-shadow:0 7px 0 #ba5730}.game small{display:block;font-weight:600;margin-top:5px}.voice{border:0;border-radius:18px;background:#ffd166;padding:11px 17px;font:inherit;font-weight:850;box-shadow:0 5px 0 #b48e30}@media(max-width:480px){.home{width:100vw;border:0;border-radius:0;padding:12px}.games{grid-template-columns:1fr 1fr;gap:8px}.game{padding:12px 6px;font-size:1rem}.game span{font-size:3rem}}
</style>
</head>
<body>
<main class="home">
<div style="font-size:5rem">🎡</div>
<h1>L'aventura d'aprendre</h1>
<p>Tria un joc o juga una mica de tot.</p>
<button class="voice" id="voice">🔊 REPETIR</button>
<div class="games">
<a class="game" href="matematicas.html"><span>➕</span>Matemàtiques<small>Sumar i restar</small></a>
<a class="game" href="lectura.html"><span>📚</span>Lectura<small>Paraules i frases</small></a>
<a class="game" href="diferencias.html"><span>🔎</span>Diferències<small>Troba els canvis</small></a>
<a class="game" href="memory.html"><span>🧠</span>Joc de memòria<small>Troba les parelles</small></a>
<a class="game all" href="tots.html"><span>🌟</span>Una mica de tot<small>Una activitat de cada joc, sense final</small></a>
</div>
</main>
<script src="voice-quality.js"></script>
<script>
function speak(){sayGameText('Tria un joc. Pots jugar a matemàtiques, a lectura, a trobar les diferències, al joc de memòria, o a una mica de tot.','ca-ES',null,.78)}
document.getElementById('voice').onclick=speak;
if(speechSynthesis.getVoices().length)setTimeout(speak,450);else{speechSynthesis.addEventListener('voiceschanged',speak,{once:true});setTimeout(speak,1200)}
</script>


</body><div id="codex-browser-sidebar-comments-root" style="position: fixed; inset: 0px; pointer-events: none; z-index: 2147483647;"></div></html>
